<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DANI'S Kniffelchen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/firebase@10.8.1/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.8.1/firebase-database-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.8.1/firebase-auth-compat.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body{font-family:'Outfit',sans-serif;background:radial-gradient(circle at top left,rgba(143,95,255,.35),transparent 30%),radial-gradient(circle at top right,rgba(255,79,216,.25),transparent 35%),linear-gradient(180deg,#050111,#120523);color:#fff;min-height:100vh;padding:clamp(5px,1.2vw,14px);overflow-x:hidden}
.layout{display:grid;grid-template-columns:190px 1fr;gap:clamp(5px,1vw,12px);max-width:1300px;margin:0 auto;align-items:start}
.panel{background:rgba(10,12,38,.85);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:clamp(9px,1.5vw,16px);backdrop-filter:blur(18px)}
.logo{text-align:center;margin-bottom:8px}
.logo h1{font-size:clamp(18px,3vw,30px);line-height:.9;font-weight:900;background:linear-gradient(90deg,#ff4fd8,#53f6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:clamp(8px,1.1vw,11px);color:#ff9ef0;margin-top:2px}
.player-card{padding:clamp(6px,1vw,11px);margin-bottom:6px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);transition:.2s}
.player-card.active{border:1px solid #53f6ff;box-shadow:0 0 14px rgba(83,246,255,.22)}
.player-card .pname{font-size:clamp(9px,1.2vw,12px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-card .pscore{font-size:clamp(16px,2.5vw,26px);font-weight:900;background:linear-gradient(90deg,#53f6ff,#8f5fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.player-card .pprog{font-size:8px;color:rgba(255,255,255,.35);margin-top:1px}
.player-card.pleft{opacity:.35;border-style:dashed}
.dice-area{display:flex;flex-direction:column;align-items:center;gap:5px;margin:6px 0}
.dice-row{display:flex;gap:clamp(4px,1vw,9px);justify-content:center}
.die{width:clamp(42px,6.5vw,66px);height:clamp(42px,6.5vw,66px);border-radius:clamp(8px,1.3vw,14px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;position:relative;background:linear-gradient(145deg,#241a36,#151126,#0c0a18);border:1px solid rgba(255,255,255,.08);box-shadow:0 7px 16px rgba(0,0,0,.4),0 0 9px rgba(180,80,255,.14),inset 0 2px 4px rgba(255,255,255,.07)}
.die:before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 30%);pointer-events:none}
.die.held{outline:3px solid #53f6ff;outline-offset:3px;transform:translateY(-6px) scale(1.04);box-shadow:0 0 12px rgba(83,246,255,.5),0 12px 24px rgba(0,0,0,.45)}
.die.rolling{animation:dRoll .07s linear infinite}
@keyframes dRoll{0%{transform:rotate(-4deg) scale(.95)}50%{transform:rotate(4deg) scale(1.03)}100%{transform:rotate(-4deg) scale(.95)}}
.pips{position:relative;width:clamp(26px,4vw,42px);height:clamp(26px,4vw,42px)}
.pips span{position:absolute;width:clamp(4px,.7vw,7px);height:clamp(4px,.7vw,7px);border-radius:50%;background:#7db3ff;box-shadow:0 0 5px #7db3ff,0 0 10px rgba(125,179,255,.8)}
.pips.one span:nth-child(1){top:50%;left:50%;transform:translate(-50%,-50%)}
.pips.two span:nth-child(1){top:16%;left:16%}.pips.two span:nth-child(2){bottom:16%;right:16%}
.pips.three span:nth-child(1){top:16%;left:16%}.pips.three span:nth-child(2){top:50%;left:50%;transform:translate(-50%,-50%)}.pips.three span:nth-child(3){bottom:16%;right:16%}
.pips.four span:nth-child(1){top:16%;left:16%}.pips.four span:nth-child(2){top:16%;right:16%}.pips.four span:nth-child(3){bottom:16%;left:16%}.pips.four span:nth-child(4){bottom:16%;right:16%}
.pips.five span:nth-child(1){top:16%;left:16%}.pips.five span:nth-child(2){top:16%;right:16%}.pips.five span:nth-child(3){top:50%;left:50%;transform:translate(-50%,-50%)}.pips.five span:nth-child(4){bottom:16%;left:16%}.pips.five span:nth-child(5){bottom:16%;right:16%}
.pips.six span:nth-child(1){top:12%;left:14%}.pips.six span:nth-child(2){top:12%;right:14%}
.pips.six span:nth-child(3){top:43%;left:14%}.pips.six span:nth-child(4){top:43%;right:14%}
.pips.six span:nth-child(5){bottom:12%;left:14%}.pips.six span:nth-child(6){bottom:12%;right:14%}
.cup{width:clamp(38px,6vw,64px);height:clamp(60px,9.5vw,100px);clip-path:polygon(18% 0%,82% 0%,100% 100%,0% 100%);background:linear-gradient(to bottom,transparent 37%,rgba(83,246,255,.10) 38.5%,rgba(83,246,255,.10) 40.5%,transparent 42%),repeating-linear-gradient(to right,transparent 0px,transparent 36px,rgba(180,80,255,.07) 36px,rgba(180,80,255,.07) 37px),linear-gradient(160deg,#291b4c,#1c1238,#0e0a20);box-shadow:inset 10px 0 18px rgba(200,150,255,.05);position:relative;margin:0 auto}
.cup:before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:58%;height:12px;border-radius:50%;background:linear-gradient(to bottom,#2e2050,#1c1440);border:1.5px dashed rgba(255,79,216,.6)}
.cup:after{content:'';position:absolute;bottom:0;left:0;width:100%;height:11px;border-radius:50%;background:linear-gradient(to top,#2a1c48,#1c1440);border:1.5px dashed rgba(255,79,216,.6)}
.roll-dots{display:flex;gap:7px;justify-content:center;margin:3px 0}
.roll-dot{width:clamp(6px,1vw,9px);height:clamp(6px,1vw,9px);border-radius:50%;background:rgba(255,255,255,.17);transition:.2s}
.roll-dot.used{background:linear-gradient(135deg,#ff4fd8,#8f5fff);box-shadow:0 0 6px rgba(255,79,216,.5)}
.btn-row{gap:5px;margin-top:5px}
.btn{padding:clamp(8px,1.4vw,12px) clamp(7px,1.3vw,11px);border:none;border-radius:clamp(11px,1.6vw,15px);font-size:clamp(10px,1.5vw,13px);font-weight:800;color:white;cursor:pointer;font-family:'Outfit',sans-serif;transition:.14s;width:100%;display:block;margin-bottom:5px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn:not(:disabled):hover{filter:brightness(1.08)}
.btn-roll{background:linear-gradient(90deg,#53f6ff,#5677ff)}
.btn-reset{background:linear-gradient(90deg,#ff4fd8,#8f5fff);font-size:10px!important}
.btn-resync{background:linear-gradient(90deg,#ff9b54,#ff5f6d);font-size:10px!important}
.status-bar{padding:clamp(4px,.8vw,8px) clamp(8px,1.3vw,12px);border-radius:11px;background:rgba(143,95,255,.18);font-size:clamp(8.5px,1.2vw,11px);text-align:center;margin:4px 0;min-height:26px;line-height:1.4}
.sheet-wrap{overflow:auto;border-radius:5px;margin-top:5px;max-height:calc(100vh - 310px);scroll-behavior:smooth}
.sheet{border-collapse:collapse;width:100%;font-size:clamp(8px,1.2vw,11px);background:#fdf8f0;color:#2a1a3a;font-family:'Outfit',sans-serif}
.sheet th,.sheet td{border:1px solid #b4cad5;padding:clamp(1.5px,.35vw,3px) clamp(2.5px,.6vw,4.5px);white-space:nowrap}
.sheet .cl{background:linear-gradient(90deg,#f4eee6,#ece7de)!important;font-weight:600;text-align:left;color:#2a1a3a;width:82px;min-width:82px;max-width:82px;position:sticky;left:0;z-index:4}
.sheet .ph{background:#e5eef5!important;text-align:center;color:#6688aa;font-size:clamp(6px,.85vw,8px);width:22px;min-width:22px;max-width:22px;position:sticky;left:82px;z-index:4}
.sheet .sr td{background:linear-gradient(90deg,#c8dce8,#bcd0e2)!important;font-weight:700;font-size:clamp(6px,.85vw,8.5px);color:#264d65;text-transform:uppercase;padding:2px 4px}
.sheet .sr .cl{background:#c2d8e6!important}.sheet .sr .ph{background:#c2d8e6!important}
.sheet .cr td{background:#e8f1f7;font-weight:600;color:#334455;font-size:clamp(7.5px,1vw,10px)}
.sheet .cr .cl{background:#dde9f0!important}.sheet .cr .ph{background:#dde9f0!important}
.sheet .fr td{background:linear-gradient(90deg,#c4d8e5,#b0cce0);font-weight:900;font-size:clamp(8.5px,1.2vw,11px);color:#182f42}
.sheet .fr .cl{background:#bad0df!important}.sheet .fr .ph{background:#bad0df!important}
.sheet .br td{background:#edf8ee}
.sheet .br .cl{background:#e4f5e6!important}.sheet .br .ph{background:#e4f5e6!important}
.sheet thead tr th{background:linear-gradient(180deg,#c8e0f0,#aecce0);font-weight:700;font-size:clamp(7px,1vw,10px);text-align:center;color:#1a3a5a;position:sticky;top:0;z-index:3}
.sheet thead tr th.cl,.sheet thead tr th.ph{z-index:5;background:linear-gradient(180deg,#c8e0f0,#aecce0)!important}
.sheet thead tr th.act{background:linear-gradient(180deg,#53f6ff,#1eb8cc)!important;color:#002233}
.sheet .sc{text-align:center;min-width:var(--cw,80px);cursor:default}
.sheet .sc.fi{font-weight:700;color:#1a1a2e}
.sheet .sc.fi.z{color:rgba(0,0,0,.24);font-style:italic}
.sheet .sc.pt{cursor:pointer;color:#1a6699;font-weight:700;background:rgba(83,180,255,.09)}
.sheet .sc.pt.gd{background:rgba(83,210,150,.13);color:#00603a}
.sheet .sc.pt.zr{color:rgba(170,0,0,.44);font-weight:400;font-style:italic}
.sheet .sc.pt:hover{background:rgba(83,200,255,.28)!important;outline:2px solid #53f6ff;outline-offset:-2px}
.sheet .sc.ac{background:rgba(83,246,255,.07)}
.sheet .sc.bon{background:linear-gradient(90deg,#c4efd0,#b2e5c0)!important;color:#1a5a22!important;font-weight:900}
.sheet .sc.pl{opacity:.32;background:rgba(0,0,0,.04)!important;cursor:default!important}
#turnOv{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(5,5,20,.88);z-index:8900;backdrop-filter:blur(10px)}
.tsc{font-size:clamp(15px,2.8vw,24px);color:#ff9ef0;margin-bottom:5px;text-align:center;padding:0 16px;font-weight:600}
.toc{font-size:clamp(20px,3.5vw,32px);font-weight:900;background:linear-gradient(90deg,#ff4fd8,#53f6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;text-align:center;padding:0 16px}
.tnl{font-size:clamp(9px,1.4vw,12px);letter-spacing:3px;color:rgba(255,255,255,.45);margin-bottom:3px}
.ton{font-size:clamp(30px,7vw,72px);font-weight:900;background:linear-gradient(90deg,#53f6ff,#ff4fd8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;padding:0 14px}
#sadOv{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:68px;z-index:99000;pointer-events:none;display:none}
@keyframes sadA{0%{transform:translate(-50%,-50%) scale(.35);opacity:1}55%{transform:translate(-50%,-72%) scale(1.1);opacity:1}100%{transform:translate(-50%,-118%) scale(1);opacity:0}}
#victoryOv{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,2,20,.9);z-index:99900;backdrop-filter:blur(14px);overflow:hidden}
#victoryOv.show{display:flex}
.vc{width:min(460px,93vw);background:linear-gradient(160deg,#0d0821,#180e32);border-radius:26px;padding:clamp(18px,3vw,32px);text-align:center;border:1px solid rgba(139,92,246,.3);box-shadow:0 0 50px rgba(139,92,246,.2);position:relative;z-index:2}
.vp{font-size:clamp(24px,4.5vw,40px);font-weight:900;background:linear-gradient(90deg,#ff4fd8,#53f6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.vn{font-size:clamp(16px,2.8vw,26px);font-weight:700;color:#fff;margin-bottom:2px}
.vs{font-size:clamp(13px,2vw,20px);color:#ff9ef0;margin-bottom:12px}
.vx{font-size:clamp(12px,1.8vw,17px);margin-bottom:16px;opacity:.88}
.vb{padding:11px 26px;border:none;border-radius:14px;font-size:clamp(12px,1.7vw,15px);font-weight:900;color:white;cursor:pointer;background:linear-gradient(90deg,#8f5fff,#ff4fd8);font-family:'Outfit',sans-serif}
@keyframes cFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(600deg);opacity:0}}
.cpc{position:fixed;top:-10px;z-index:99800;pointer-events:none;animation:cFall linear forwards}
#mpOv{position:fixed;inset:0;background:rgba(5,2,20,.97);backdrop-filter:blur(14px);z-index:88888;display:flex;align-items:center;justify-content:center}
.mpb{width:min(480px,96vw);background:linear-gradient(160deg,#0d0821,#180e32);border:1px solid rgba(139,92,246,.3);border-radius:22px;padding:clamp(18px,3vw,30px);color:#fff;box-shadow:0 0 50px rgba(139,92,246,.2);max-height:96vh;overflow-y:auto}
.mpt{font-size:clamp(26px,4.5vw,38px);font-weight:900;background:linear-gradient(90deg,#ff4fd8,#53f6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:.88;margin-bottom:5px}
.mps{font-size:11px;color:#ff9ef0;margin-bottom:18px}
.mpl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.36);letter-spacing:1.2px;display:block;margin-bottom:4px}
.mpi{width:100%;padding:12px 13px;border-radius:11px;border:2px solid rgba(139,92,246,.4);background:rgba(255,255,255,.05);color:#fff;font-family:'Outfit',sans-serif;font-size:16px;outline:none;margin-bottom:12px;caret-color:#53f6ff;user-select:auto;-webkit-user-select:auto}
.mpi:focus{border-color:rgba(83,246,255,.55)}
.mpbt{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#8f5fff,#ff4fd8);color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:8px;transition:.14s;display:block}
.mpbt:hover{filter:brightness(1.07)}
.mpbt.ai{background:linear-gradient(135deg,#53f6ff,#5677ff)}
.mpbt.lv{background:rgba(255,79,79,.12);border:1px solid rgba(255,79,79,.28);color:rgba(255,120,120,.75);font-size:12px;padding:9px}
.mpbg{padding:9px 13px;border-radius:11px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);font-size:11.5px;color:rgba(255,255,255,.5);margin-bottom:12px;min-height:34px}
.mpwl{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:150px;overflow-y:auto}
.mppr{padding:8px 11px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);font-size:12.5px;display:flex;align-items:center;gap:6px}
.mpdiv{height:1px;background:rgba(255,255,255,.1);margin:10px 0}
.aicnt-row{display:flex;gap:8px;margin-bottom:10px}
.aicnt-btn{flex:1;padding:10px 8px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;color:#fff;background:rgba(255,255,255,.08)}
.aicnt-btn.sel{background:linear-gradient(135deg,#8f5fff,#ff4fd8)}
@keyframes db{0%,100%{opacity:.2}50%{opacity:1}}
.da span{display:inline-block;animation:db 1.2s infinite}.da span:nth-child(2){animation-delay:.22s}.da span:nth-child(3){animation-delay:.44s}
#victoryTestBtn{display:none}
@media(max-width:700px){.layout{grid-template-columns:155px 1fr!important}.sheet-wrap{max-height:calc(100vh - 340px)}}
@media(max-width:449px){body{padding:4px!important}.layout{grid-template-columns:1fr!important}.lp2{display:none!important}.cup{width:34px!important;height:54px!important}.sheet-wrap{max-height:calc(100vh - 270px)}.sheet{font-size:9px!important}.sheet th,.sheet td{padding:1.5px 2px!important}}
</style>
</head>
<body>
<div id="sadOv">😢</div>
<div id="turnOv" onclick="this.style.display='none'">
  <div class="tsc" id="tonScore" style="display:none"></div>
  <div class="toc" id="tonC">🎲 Du bist dran!</div>
  <div class="tnl">NÄCHSTER SPIELER</div>
  <div class="ton" id="tonN">SPIELER</div>
</div>
<div id="victoryOv"></div>
<button id="victoryTestBtn"></button>

<div id="mpOv">
  <div class="mpb">
    <div class="mpt">DANI'S<br>Kniffelchen</div>
    <div class="mps">🎲 Das Würfelspiel für Freunde</div>
    <div id="mpLobby">
      <label class="mpl">DEIN NAME</label>
      <input id="mpNI" class="mpi" maxlength="16" placeholder="Name eingeben…" autocomplete="off"
        oninput="updAIPreview()" onkeydown="if(event.key==='Enter')mpConnect()">

      <label class="mpl">MULTIPLAYER</label>
      <div id="mpBadge" class="mpbg">⏳ Verbinde mit Raum…</div>
      <button class="mpbt" onclick="mpConnect()">🌐 Spielen →</button>
      <div class="mpdiv"></div>
      <label class="mpl">SOLO-GEGNER</label>
      <div id="aiPreview" style="font-size:12px;color:#ff9ef0;font-weight:600;min-height:17px;margin-bottom:7px"></div>
      <div class="aicnt-row">
        <button id="aiB1" class="aicnt-btn sel" onclick="setAICnt(1)">🤖 1 KI-Gegner</button>
        <button id="aiB2" class="aicnt-btn" onclick="setAICnt(2)">🤖🤖 2 KI-Gegner</button>
      </div>
      <button class="mpbt ai" onclick="soloStart()">▶ Solo spielen</button>
    </div>
    <div id="mpWait" style="display:none">
      <div style="font-size:13px;font-weight:700;margin-bottom:9px;color:rgba(255,255,255,.55);letter-spacing:.8px">WARTERAUM</div>
      <div style="font-size:12px;margin-bottom:10px" id="mpWM">Warten<span class="da"><span>.</span><span>.</span><span>.</span></span></div>
      <div class="mpwl" id="mpWL"></div>
      <button class="mpbt ai" id="mpAI" onclick="mpStartVsAI()">🤖 Gegen KI starten</button>
      <div class="mpdiv"></div>
      <button class="mpbt lv" onclick="mpLeaveWait()">← Verlassen</button>
    </div>
  </div>
</div>

<div class="layout" id="GL" style="display:none">
  <div class="panel lp2" id="LP"></div>
  <div class="panel cp2" id="CP">
    <div class="logo"><h1>DANI'S<br>Kniffelchen</h1><p>🎲 Das Würfelspiel für Freunde</p></div>
    <div class="dice-area">
      <div id="DW"></div>
      <div class="roll-dots"><div class="roll-dot" id="rd0"></div><div class="roll-dot" id="rd1"></div><div class="roll-dot" id="rd2"></div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-roll" id="rollBtn" onclick="doRoll()">🎲 Würfeln</button>
      <button class="btn btn-reset" id="resetBtn" onclick="mpResetGame()" style="display:none">🔄 Spiel zurücksetzen</button>
      <button class="btn btn-resync" id="resyncBtn" onclick="mpResync()" style="display:none">↺ Re-Sync</button>
      <button class="mpbt lv" id="leaveBtn" onclick="mpLeave()" style="display:none">← Verlassen</button>
    </div>
    <div class="status-bar" id="SB">Lade…</div>
    <div class="sheet-wrap" id="SW"></div>
  </div>
</div>

<script>

'use strict';
const CATS=[
  {id:'ones',  lab:'⚀ Einser',    sec:'u',h:'·'},
  {id:'twos',  lab:'⚁ Zweier',    sec:'u',h:'·'},
  {id:'threes',lab:'⚂ Dreier',    sec:'u',h:'·'},
  {id:'fours', lab:'⚃ Vierer',    sec:'u',h:'·'},
  {id:'fives', lab:'⚄ Fünfer',    sec:'u',h:'·'},
  {id:'sixes', lab:'⚅ Sechser',   sec:'u',h:'·'},
  {id:'t3',    lab:'Dreierpasch', sec:'l',h:'Σ'},
  {id:'t4',    lab:'Viererpasch', sec:'l',h:'Σ'},
  {id:'fh',    lab:'Full House',  sec:'l',h:'25'},
  {id:'ss',    lab:'Kl. Straße', sec:'l',h:'30'},
  {id:'bs',    lab:'Gr. Straße', sec:'l',h:'40'},
  {id:'kn',    lab:'Kniffel! 🎲', sec:'l',h:'50'},
  {id:'ch',    lab:'Chance',      sec:'l',h:'Σ'},
];
const UP=CATS.filter(c=>c.sec==='u');
const LO=CATS.filter(c=>c.sec==='l');
const AI_POOL=['Nici','Marco','Leni','Mia','Nele','Dani','Finn','Sascha'];
const PIPS={
  1:'<div class="pips one"><span></span></div>',
  2:'<div class="pips two"><span></span><span></span></div>',
  3:'<div class="pips three"><span></span><span></span><span></span></div>',

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function fixArr(v){if(!v)return[];if(Array.isArray(v))return v;return Object.keys(v).sort((a,b)=>+a-+b).map(k=>v[k]);}
function ss(t){const e=document.getElementById('SB');if(e)e.textContent=t;}

// SCORECARD
function newSC(){const s={};CATS.forEach(c=>s[c.id]=null);return s;}
function scToFB(sc){const r={};if(!sc)return r;Object.entries(sc).forEach(([k,v])=>{if(v!==null)r[k]=v;});return r;}
function scFromFB(d){const s=newSC();if(d)Object.entries(d).forEach(([k,v])=>{if(k in s)s[k]=v;});return s;}

// SCORING
function calcSc(cat,d){
  if(!d||d.length!==5)return 0;
  const c={};d.forEach(v=>c[v]=(c[v]||0)+1);
  const sum=d.reduce((a,b)=>a+b,0);
  const mc=Math.max(...Object.values(c));
  const u=[...new Set(d)].sort((a,b)=>a-b);
  switch(cat){
    case 'ones':  return(c[1]||0)*1;
    case 'twos':  return(c[2]||0)*2;
    case 'threes':return(c[3]||0)*3;
    case 'fours': return(c[4]||0)*4;
    case 'fives': return(c[5]||0)*5;
    case 'sixes': return(c[6]||0)*6;
    case 't3':return mc>=3?sum:0;
    case 't4':return mc>=4?sum:0;
    case 'fh':{const sv=Object.values(c).sort();return(sv.length===2&&sv[0]===2&&sv[1]===3)?25:0;}
    case 'ss':return[[1,2,3,4],[2,3,4,5],[3,4,5,6]].some(s=>s.every(v=>u.includes(v)))?30:0;
    case 'bs':return(u.length===5&&u[4]-u[0]===4)?40:0;
    case 'kn':return mc===5?50:0;
    case 'ch':return sum;
    default:return 0;
  }
}
function uSum(sc){return['ones','twos','threes','fours','fives','sixes'].reduce((s,k)=>s+(sc[k]!=null?sc[k]:0),0);}
function hasBonus(sc){return UP.every(c=>sc[c.id]!=null)&&uSum(sc)>=63;}
function uTot(sc){return uSum(sc)+(hasBonus(sc)?35:0);}
function lTot(sc){return LO.reduce((s,c)=>s+(sc[c.id]!=null?sc[c.id]:0),0);}
function gTot(sc){return uTot(sc)+lTot(sc);}
function done(sc){return CATS.every(c=>sc[c.id]!=null);}
function worstSC(){
  let w=null;activeP().forEach(p=>{if(!w||gTot(p.sc)<gTot(w.sc))w=p;});
  return w?{...w.sc}:newSC();
}

let _ac=null;
function playDice(){try{diceAudio.pause();diceAudio.currentTime=0;diceAudio.play().catch(()=>{});}catch(e){}}
function getAC(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _ac;}
function playSignal(){
  try{
    const ctx=getAC();if(!ctx)return;
    if(ctx.state==='suspended')ctx.resume();
    const osc=ctx.createOscillator();const g=ctx.createGain();
    osc.type='sine';osc.frequency.value=880;
    g.gain.setValueAtTime(.22,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.55);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.6);
  }catch(e){}
}
function checkSignal(ts){
  const mine=!MP.on||(cp===MP.myIdx&&!players[cp]?.isAI);
  if(mine&&ts>_lastSignalTs){_lastSignalTs=ts;playSignal();}
}

// LOBBY AI SELECTION
function setAICnt(n){
  _aiCnt=n;
  document.getElementById('aiB1')?.classList.toggle('sel',n===1);
  document.getElementById('aiB2')?.classList.toggle('sel',n===2);
  updAIPreview();
}
function updAIPreview(){
  const name=(document.getElementById('mpNI')?.value||'').trim();
  const taken=name?[name.toLowerCase()]:[];
  const pool=shuffle(AI_POOL.filter(x=>!taken.includes(x.toLowerCase())));
  const names=pool.slice(0,_aiCnt).map(x=>x+' (KI)').join(' & ');
  const el=document.getElementById('aiPreview');
  if(el)el.textContent=names?'→ '+names:'';
}
function soloStart(){
  const name=(document.getElementById('mpNI')?.value||'').trim();
  if(!name){const e=document.getElementById('mpNI');if(e){e.style.borderColor='rgba(239,68,68,.7)';e.focus();}return;}
  localStorage.setItem('kn_mp_name',name);
  MP.myName=name;
  const taken=[name.toLowerCase()];
  const pool=shuffle(AI_POOL.filter(x=>!taken.includes(x.toLowerCase())));
  players=[{name,isAI:F,left:F,sc:newSC()}];
  for(let i=0;i<_aiCnt;i++)players.push({name:pool[i]+' (KI)',isAI:T,left:F,sc:newSC()});
  cp=0;dice=[];held=[F,F,F,F,F];rc=0;go=F;prevBon={};
  _hideMPOv();
  document.getElementById('GL').style.display='grid';
  renderAll();renderDots();updBtn();
  showTurnOv(players[0].name,'🎲 Spiel startet!',null);
  checkSignal(Date.now());
  ss(esc(players[0].name)+' beginnt!');
  if(players[0].isAI)setTimeout(()=>aiTurn(),1800);
}

// GAME ACTIONS
function doRoll(){
  if(go)return;
  if(MP.on&&!players[cp]?.isAI&&cp!==MP.myIdx){ss('⏳ '+esc(players[cp]?.name)+' ist am Zug…');return;}
  if(rc>=3){ss('⚠️ 3 Würfe aufgebraucht — wähle ein Feld!');return;}
  if(aiBusy)return;
  if(rc===0){dice=[1,2,3,4,5].map(()=>Math.floor(Math.random()*6)+1);held=[F,F,F,F,F];}
  else dice=dice.map((d,i)=>held[i]?d:Math.floor(Math.random()*6)+1);
  rc++;playDice();
  window._pRollTs=Date.now();
  const w=document.getElementById('DW');
  if(w)w.querySelectorAll('.die').forEach(d=>d.classList.add('rolling'));
  setTimeout(()=>{if(w)w.querySelectorAll('.die').forEach(d=>d.classList.remove('rolling'));},340);
  renderDice();renderSheet();renderDots();updBtn();
  if(rc>=3)ss('🎲 Letzter Wurf — Feld antippen zum Eintragen.');
  else ss('🎲 Wurf '+rc+'/3 — Würfel halten oder nochmal / Feld wählen.');
  if(MP.on)MP.push();
}
function toggleHold(i){
  if(go||rc===0||rc>=3)return;
  if(MP.on&&!players[cp]?.isAI&&cp!==MP.myIdx)return;
  held[i]=!held[i];renderDice();
  if(MP.on)MP.push();
}
function scoreField(cat){
  if(go)return;
  if(rc===0){ss('⚠️ Erst würfeln!');return;}
  if(MP.on&&!players[cp]?.isAI&&cp!==MP.myIdx)return;
  const p=players[cp];
  if(!p||p.sc[cat]!=null||p.left)return;
  const val=calcSc(cat,dice);
  p.sc[cat]=val;
  if(val===0){showSad();window._pSadTs=Date.now();}
  if(!prevBon[cp]&&hasBonus(p.sc)){
    prevBon[cp]=T;launchConfetti(260);window._pConfTs=Date.now();
    setTimeout(()=>ss('🎉 BONUS! +35 Punkte für '+esc(p.name)+' 🎉'),150);
  }
  const catObj=CATS.find(c=>c.id===cat);
  const catName=catObj?catObj.lab.replace(/\p{Emoji}/gu,'').trim():cat;
  window._lastScored=catName+': '+val+' Punkte';
  const allDone=activeP().every(pl=>done(pl.sc));
  if(allDone){go=T;if(MP.on)MP.push();setTimeout(()=>trigVic(),650);return;}
  const comment=val===0
    ?rnd(['😬 Gestrichen.','🤷 Null Punkte.','😅 War nix.','😑 Muss sein.'])
    :val>=40?rnd(['🎯 Stark!','✨ Sehr gut!','🔥 Schön!','💎 Klasse!'])
    :rnd(['👍 Eingetragen.','✅ Erledigt.','📝 Notiert.','👌 Solide.']);
  nextPlayer(comment);
}
function nextPlayer(comment){
  const scored=window._lastScored||null;window._lastScored=null;
  dice=[];held=[F,F,F,F,F];rc=0;
  cp=(cp+1)%players.length;
  let safe=0;while(players[cp]?.left&&safe++<players.length)cp=(cp+1)%players.length;
  if(activeP().every(pl=>done(pl.sc))){go=T;if(MP.on)MP.push();setTimeout(()=>trigVic(),650);return;}
  renderAll();renderDots();updBtn();
  if(!MP.on){
    showTurnOv(players[cp].name,comment,scored);
    checkSignal(Date.now());
  } else {
    window._pOvl={name:players[cp].name,comment,scored};
    MP.push();window._pOvl=null;window._pConfTs=null;window._pSadTs=null;
  }
  const mine=!MP.on||(cp===MP.myIdx&&!players[cp]?.isAI);
  if(mine)ss('⭐ Du bist dran ✦ — Jetzt würfeln!');
  else ss(esc(players[cp]?.name)+' ist am Zug…');
  if(players[cp]?.isAI&&!players[cp]?.left)setTimeout(()=>aiTurn(),1800);
}

// AI
function aiDecHold(){
  const c={};dice.forEach(v=>c[v]=(c[v]||0)+1);
  const mc=Math.max(...Object.values(c));
  const u=[...new Set(dice)].sort((a,b)=>a-b);
  const sc=players[cp].sc;held=[F,F,F,F,F];
  if(mc>=4&&sc['kn']==null){const tv=+Object.entries(c).find(([,v])=>v>=4)[0];dice.forEach((v,i)=>{if(v===tv)held[i]=T;});return;}
  if(mc===3){
    const tv=+Object.entries(c).find(([,v])=>v===3)[0];
    dice.forEach((v,i)=>{if(v===tv)held[i]=T;});
    const pv=+Object.entries(c).find(([k,v])=>v===2&&+k!==tv)?.[0]||0;
    if(pv)dice.forEach((v,i)=>{if(v===pv)held[i]=T;});return;
  }
  if(u.length>=4&&sc['bs']==null){
    for(const sq of[[1,2,3,4,5],[2,3,4,5,6]]){
      if(sq.filter(v=>u.includes(v)).length>=4){
        const ss2=new Set(sq);const used=new Set();
        dice.forEach((v,i)=>{if(ss2.has(v)&&!used.has(v)){held[i]=T;used.add(v);}});return;
      }
    }
  }
  if(u.length>=3&&sc['ss']==null){
    for(const sq of[[1,2,3,4],[2,3,4,5],[3,4,5,6]]){
      if(sq.filter(v=>u.includes(v)).length>=3){
        const ss2=new Set(sq);const used=new Set();
        dice.forEach((v,i)=>{if(ss2.has(v)&&!used.has(v)){held[i]=T;used.add(v);}});return;
      }
    }
  }
  const cm={1:'ones',2:'twos',3:'threes',4:'fours',5:'fives',6:'sixes'};
  const cands=Object.entries(c).filter(([v])=>sc[cm[v]]==null).sort(([va,ca],[vb,cb])=>(+vb*cb)-(+va*ca));
  if(cands.length>0){const bv=+cands[0][0];dice.forEach((v,i)=>{if(v===bv)held[i]=T;});return;}
  const hv=Math.max(...dice);dice.forEach((v,i)=>{if(v===hv)held[i]=T;});
}
function aiPickCat(){
  const sc=players[cp].sc;let best=null,bv=-1;
  CATS.forEach(cat=>{
    if(sc[cat.id]!=null)return;
    const v=calcSc(cat.id,dice);const w=cat.sec==='u'?1.1:1;
    if(v*w>bv){bv=v*w;best=cat.id;}
  });
  if(bv<=0){const le=LO.find(c=>sc[c.id]==null);best=le?le.id:CATS.find(c=>sc[c.id]==null)?.id;}
  return best;
}
function aiTurn(){
  if(MP.on&&!MP.host)return;
  if(aiBusy)return;
  if(!players[cp]?.isAI||players[cp]?.left)return;
  aiBusy=T;ss(esc(players[cp].name)+' überlegt…');
  setTimeout(()=>_aiS(0),1700);
}
function _aiS(n){
  if(!players[cp]?.isAI||players[cp]?.left){aiBusy=F;return;}
  doRoll();renderDice();renderSheet();if(MP.on)MP.push();
  const again=rc<3&&n<1+Math.floor(Math.random()*2);
  if(again){
    setTimeout(()=>{
      aiDecHold();renderDice();ss(esc(players[cp].name)+' hält Würfel…');if(MP.on)MP.push();
      setTimeout(()=>_aiS(n+1),1300);
    },1050);
  } else {
    setTimeout(()=>{const cat=aiPickCat();aiBusy=F;if(cat)scoreField(cat);else nextPlayer('🤖 KI patscht.');},1600);
  }
}

function showSad(){

function showTurnOv(name,comment,scored){
  const sEl=document.getElementById('tonScore');
  if(sEl){if(scored){sEl.textContent=scored;sEl.style.display='block';}else sEl.style.display='none';}
  document.getElementById('tonC').textContent=comment;
  document.getElementById('tonN').textContent=name.toUpperCase();
  const o=document.getElementById('turnOv');o.style.display='flex';
  setTimeout(()=>{o.style.display='none';},3400);
}
function launchConfetti(n=170){
  const cols=['#53f6ff','#ff4fd8','#8f5fff','#5eff9b','#ff9b54','#ffd166'];
  const shp=['50%','3px','0'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='cpc';
    const dur=2.4+Math.random()*3.4,del=Math.random()*1.1,sz=5+Math.random()*11;
    d.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${shp[~~(Math.random()*shp.length)]};animation-duration:${dur}s;animation-delay:${del}s`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),(dur+del+.5)*1000);
  }
}

// RENDER
function renderAll(){renderPlayers();renderDice();renderSheet();}
function updateColW(){
  const el=document.getElementById('SW');if(!el)return;
  const n=Math.max(1,players.filter(p=>p&&p.name).length);
  const avail=el.clientWidth-106;
  const mob=window.innerWidth<450;
  let cw=mob?Math.max(72,Math.floor(avail/3)):Math.max(55,Math.floor(avail/Math.min(n,8)));
  document.documentElement.style.setProperty('--cw',cw+'px');
}
function scrollToActive(){
  const sw=document.getElementById('SW');if(!sw)return;
  requestAnimationFrame(()=>{
    const act=sw.querySelector('thead th.act');if(!act)return;
    const target=act.offsetLeft-(sw.clientWidth/2)+(act.offsetWidth/2);
    sw.scrollTo({left:Math.max(0,target),behavior:'smooth'});
  });
}
function renderPlayers(){
  const e=document.getElementById('LP');if(!e)return;
  let h='<div style="letter-spacing:2px;font-size:9.5px;opacity:.4;margin-bottom:7px">SPIELER</div>';
  players.forEach((p,i)=>{
    if(!p||!p.name)return;
    const tot=gTot(p.sc),fil=CATS.filter(c=>p.sc[c.id]!=null).length;
    const isA=i===cp,isMe=MP.on&&i===MP.myIdx,isLeft=!!p.left;
    h+=`<div class="player-card${isA?' active':''}${isLeft?' pleft':''}">
      <div class="pname">${esc(p.name.replace(' (KI)','').substring(0,10))}${isMe?' ⭐':''}${isLeft?' (weg)':''}</div>
      <div class="pscore">${tot}</div>
      <div class="pprog">${fil}/13${isA?' — dran ✦':''}</div>
    </div>`;
  });
  e.innerHTML=h;
}
function renderDice(){
  const w=document.getElementById('DW');if(!w)return;
  if(rc===0){w.innerHTML='<div class="cup"></div><div style="font-size:10px;opacity:.38;margin-top:4px;text-align:center">Würfeln zum Start</div>';return;}
  w.innerHTML=`<div class="dice-row">${dice.map((d,i)=>`<div class="die${held[i]?' held':''}" onclick="toggleHold(${i})">${PIPS[d]}</div>`).join('')}</div>`;

function renderDots(){for(let i=0;i<3;i++){const d=document.getElementById('rd'+i);if(d)d.className='roll-dot'+(i<rc?' used':'');}}
function updBtn(){
  const btn=document.getElementById('rollBtn');if(!btn)return;

  btn.disabled=!mine||rc>=3||go||aiBusy||!!players[cp]?.left;

function renderSheet(){
  const el=document.getElementById('SW');if(!el||!players.length)return;
  updateColW();
  const mine=!MP.on||(cp===MP.myIdx&&!players[cp]?.isAI);
  const canSc=mine&&rc>0&&!go&&!players[cp]?.left;
  const vis=players.filter(p=>p&&p.name);
  let th='<tr><th class="cl">Kategorie</th><th class="ph">Pkt</th>';
  vis.forEach(p=>{
    const ri=players.indexOf(p);const isA=ri===cp;const isL=!!p.left;
    th+=`<th class="sc${isA?' act':''}"${isL?' style="opacity:.35"':''}>${esc(p.name.replace(' (KI)','').substring(0,8))}${isA?' ✦':''}</th>`;
  });
  th+='</tr>';
  let tb='';
  tb+=`<tr class="sr"><td colspan="${vis.length+2}">OBERER TEIL</td></tr>`;
  UP.forEach(cat=>{tb+=bldRow(cat,canSc,vis);});
  tb+=bldComp('Gesamt',vis.map(p=>uSum(p.sc)),F,vis);
  tb+=bldBonus(vis);
  tb+=bldComp('Gesamt ob. Teil',vis.map(p=>uTot(p.sc)),F,vis);
  tb+=`<tr class="sr"><td colspan="${vis.length+2}">UNTERER TEIL</td></tr>`;
  LO.forEach(cat=>{tb+=bldRow(cat,canSc,vis);});
  tb+=bldComp('Gesamt unt. Teil',vis.map(p=>lTot(p.sc)),F,vis);
  tb+=bldComp('Gesamt ob. Teil',vis.map(p=>uTot(p.sc)),F,vis);
  tb+=bldComp('⭐ Endsumme',vis.map(p=>gTot(p.sc)),T,vis);
  el.innerHTML=`<table class="sheet"><thead>${th}</thead><tbody>${tb}</tbody></table>`;
  scrollToActive();
}
function bldRow(cat,canSc,vis){
  let cells='';
  vis.forEach(p=>{
    const ri=players.indexOf(p);const v=p.sc[cat.id];const isA=ri===cp;const isL=!!p.left;
    if(v!==null&&v!==undefined){
      cells+=`<td class="sc fi${v===0?' z':''}${isA?' ac':''}${isL?' pl':''}">${v}</td>`;
    } else if(canSc&&isA&&!isL){
      const pot=calcSc(cat.id,dice);
      cells+=`<td class="sc pt ${pot>0?'gd':'zr'} ac" onclick="scoreField('${cat.id}')">${pot}</td>`;
    } else {
      cells+=`<td class="sc${isA?' ac':''}${isL?' pl':''}"></td>`;
    }
  });
  return`<tr><td class="cl">${cat.lab}</td><td class="ph">${cat.h}</td>${cells}</tr>`;
}
function bldComp(label,vals,isFinal,vis){
  let cells='';
  vals.forEach((v,i)=>{
    const p=vis[i];const ri=p?players.indexOf(p):-1;const isA=ri===cp;const isL=!!(p?.left);
    cells+=`<td class="sc${isA?' ac':''}${isL?' pl':''}">${v}</td>`;
  });
  return`<tr class="${isFinal?'fr':'cr'}"><td class="cl" style="font-weight:${isFinal?900:700}">${label}</td><td class="ph">→</td>${cells}</tr>`;
}
function bldBonus(vis){
  let cells='';
  vis.forEach(p=>{
    const ri=players.indexOf(p);const isA=ri===cp;const isL=!!p.left;
    const us=uSum(p.sc);const bonOk=hasBonus(p.sc);const filU=UP.filter(c=>p.sc[c.id]!=null).length;
    let con='',ex='';
    if(bonOk){con='+35 🎉';ex=' bon';}else if(filU>0){con=us+'/63';}
    cells+=`<td class="sc${ex}${isA?' ac':''}${isL?' pl':''}">${con}</td>`;
  });
  return`<tr class="br cr"><td class="cl">Bonus ≥63</td><td class="ph" style="font-size:7px">+35</td>${cells}</tr>`;
}

function _bldVic(ps){

function iDB(){if(_db)return _db;if(typeof firebase==='undefined')return null;if(!firebase.apps.length)firebase.initializeApp(FB);_db=firebase.database();try{firebase.auth().signInAnonymously().catch(()=>{});}catch(e){}return _db;}

const MP={
  on:F,host:F,myIdx:0,myName:'',_ref:null,_sub:null,
  async push(){
    if(!this.on||!this._ref)return;
    const now=Date.now();_lPush=now>_lPush?now:_lPush+1;
    const state={players:players.map(p=>({name:p.name,isAI:!!p.isAI,left:!!p.left,sc:scToFB(p.sc)})),cp,dice:[...dice],held:[...held],rc,go,ts:_lPush,ovl:window._pOvl||null,rollTs:window._pRollTs||null,confTs:window._pConfTs||null,sadTs:window._pSadTs||null};
    try{await this._ref.child('state').set(state);}catch(e){console.warn('push:',e);}
  },
  listen(){
    if(!this._ref)return;
    this._sub=this._ref.on('value',snap=>{
      const room=snap.val();if(!room)return;
      // Reset signal detection
      if(room.resetSig&&room.resetSig!==_lastResetSig){
        _lastResetSig=room.resetSig;
        if(MP.host)MP._ref.remove().finally(()=>location.reload());
        else location.reload();

      }
      if(room.status==='waiting'){_rndWait(room);return;}
      if(room.status==='playing'&&room.state){const s=room.state;if(s.ts<=_lTs)return;_lTs=s.ts;_hydrate(s);}
    });
  },
  stop(){if(this._ref&&this._sub)this._ref.off('value',this._sub);Object.assign(this,{on:F,host:F,_ref:null,_sub:null,myIdx:0});}
};
window.MP=MP;

function _hydrate(s){
  _hideMPOv();document.getElementById('GL').style.display='grid';
  if(s.players){
    const pa=fixArr(s.players).filter(Boolean);
    if(pa.length)players=pa.map(p=>({name:p.name||'?',isAI:!!p.isAI,left:!!p.left,sc:scFromFB(p.sc)}));
    if(!MP.host)players.forEach((p,i)=>{if(p.name===MP.myName&&!p.isAI&&!p.left)MP.myIdx=i;});
  }
  if(typeof s.cp==='number')cp=s.cp;
  dice=Array.isArray(s.dice)?[...s.dice]:[];
  held=Array.isArray(s.held)?[...s.held]:[F,F,F,F,F];
  if(typeof s.rc==='number')rc=s.rc;
  if(typeof s.go==='boolean')go=s.go;
  if(s.rollTs&&s.rollTs!==window._mpLRoll){window._mpLRoll=s.rollTs;playDice();}
  if(s.confTs&&s.confTs!==window._mpLConf){window._mpLConf=s.confTs;launchConfetti(180);}
  if(s.sadTs&&s.sadTs!==window._mpLSad){window._mpLSad=s.sadTs;showSad();}
  renderAll();renderDots();updBtn();
  const mine=!players[cp]?.isAI&&!players[cp]?.left&&cp===MP.myIdx;

  if(mine){ss('⭐ Du bist dran ✦ — Jetzt würfeln!');checkSignal(s.ts);}
  else if(!isAI)ss('⏳ '+esc(players[cp]?.name||'?')+' ist am Zug…');
  if(s.ovl&&s.ovl.name){const age=Date.now()-(s.ts||0);if(age<3500)setTimeout(()=>showTurnOv(s.ovl.name,s.ovl.comment||'',s.ovl.scored||null),80);}
  if(s.go&&!go){go=T;setTimeout(()=>{_bldVic(activeP().sort((a,b)=>gTot(b.sc)-gTot(a.sc)));document.getElementById('victoryTestBtn').click();},600);return;}
  if(MP.host&&isAI&&!aiBusy)setTimeout(()=>{if(players[cp]?.isAI&&!players[cp]?.left&&!aiBusy)aiTurn();},900);
  const rb=document.getElementById('resyncBtn');if(rb)rb.style.display=MP.host?'block':'none';
  const xb=document.getElementById('resetBtn');if(xb)xb.style.display=MP.host?'block':'none';
  const lb=document.getElementById('leaveBtn');if(lb)lb.style.display=(MP.on&&MP.myIdx>=0&&!players[MP.myIdx]?.left)?'block':'none';
}
function _rndWait(room){
  const rp=fixArr(room.players||[]).filter(p=>p&&p.name&&!p.empty);
  const wl=document.getElementById('mpWL');
  if(wl)wl.innerHTML=rp.map(p=>`<div class="mppr"><span>${p.name===MP.myName?'⭐':'🎲'}</span><span>${esc(p.name)}</span>${p.name===room.hostName?'<span style="margin-left:auto;font-size:9px;color:#53f6ff">HOST</span>':''}</div>`).join('');
  const wm=document.getElementById('mpWM');
  if(wm)wm.innerHTML='<b>'+esc(MP.myName)+'</b> wartet<span class="da"><span>.</span><span>.</span><span>.</span></span>';
  const ai=document.getElementById('mpAI');if(ai)ai.style.display=MP.host?'block':'none';
}
function _hideMPOv(){const e=document.getElementById('mpOv');if(e)e.style.display='none';}
function _showWait(){document.getElementById('mpLobby').style.display='none';document.getElementById('mpWait').style.display='block';document.getElementById('mpOv').style.display='flex';}
function _setBadge(t){const e=document.getElementById('mpBadge');if(e)e.textContent=t;}

window.mpConnect=async function(){
  const name=(document.getElementById('mpNI')?.value||'').trim();
  if(!name){const e=document.getElementById('mpNI');if(e){e.style.borderColor='rgba(239,68,68,.7)';e.focus();}return;}
  localStorage.setItem('kn_mp_name',name);MP.myName=name;_setBadge('⏳ Verbinde…');
  try{
    MP._ref=rRef();
    if(!MP._ref){_setBadge('❌ Firebase nicht verfügbar');return;}
    const snap=await MP._ref.once('value');
    const room=snap.val();
    const stale=room&&(Date.now()-(room.ts||0))>15*60*1000;
    if(!room||stale){if(stale)await MP._ref.remove().catch(()=>{});await _asHost(name);}
    else if(room.status==='waiting'){
      const rp=fixArr(room.players);
      const slot=rp.findIndex((p,i)=>i>0&&(!p||!p.name||p.empty));
      if(slot>=0)await _asPlayer(name,room,slot);else await _asSpect(name);
    } else {await _asNew(name);}
  }catch(e){console.error(e);_setBadge('❌ '+(e?.message||'Fehler'));}
};

async function _asHost(name){
  const pArr=[{name,isAI:F,left:F}];
  for(let i=1;i<8;i++)pArr.push({name:'',isAI:F,empty:T,left:F});
  await MP._ref.set({status:'waiting',players:pArr,hostName:name,ts:Date.now()});
  MP._ref.onDisconnect().remove();
  MP.on=T;MP.host=T;MP.myIdx=0;_showWait();MP.listen();
}
async function _asPlayer(name,room,slot){
  const rp=fixArr(room.players);rp[slot]={name,isAI:F,left:F};
  await MP._ref.child('players').set(rp);
  MP._ref.child('players/'+slot).onDisconnect().set({name:'',isAI:F,empty:T,left:F});
  MP.on=T;MP.host=F;MP.myIdx=slot;_showWait();MP.listen();
}
async function _asSpect(name){
  MP.on=T;MP.host=F;MP.myIdx=-1;_hideMPOv();document.getElementById('GL').style.display='grid';MP.listen();ss('👁 Zuschauermodus');
}
async function _asNew(name){
  const snap=await MP._ref.child('state').once('value');
  const st=snap.val();if(!st)return;
  const cur=fixArr(st.players).filter(Boolean).map(p=>({...p,sc:scFromFB(p.sc)}));
  const anyF=cur.filter(p=>!p.left).every(p=>CATS.some(c=>p.sc[c.id]!==null));
  let startSC={};
  if(anyF&&cur.length>0){let w=null;cur.filter(p=>!p.left).forEach(p=>{if(!w||gTot(p.sc)<gTot(w.sc))w=p;});if(w)startSC=scToFB(w.sc);}
  const ni=cur.length;const upd={};
  upd['players/'+ni]={name,isAI:F,left:F,sc:startSC};
  _lPush=Date.now()>_lPush?Date.now():_lPush+1;upd['ts']=_lPush;
  await MP._ref.child('state').update(upd);
  MP.on=T;MP.host=F;MP.myIdx=ni;_hideMPOv();document.getElementById('GL').style.display='grid';MP.listen();ss('✅ '+esc(name)+' ist dabei!');
}

window.mpStartVsAI=async function(){
  if(!MP.host)return;
  const snap=await MP._ref.once('value');const room=snap.val();
  const rp=fixArr(room?.players||[]).filter(p=>p&&p.name&&!p.empty);
  const taken=rp.map(p=>p.name.toLowerCase());
  const pool=shuffle(AI_POOL.filter(n=>!taken.includes(n.toLowerCase())));
  players=rp.map(p=>({name:p.name,isAI:F,left:F,sc:newSC()}));
  let ai=0;while(players.length<2&&ai<pool.length)players.push({name:pool[ai++]+' (KI)',isAI:T,left:F,sc:newSC()});
  cp=0;dice=[];held=[F,F,F,F,F];rc=0;go=F;prevBon={};
  MP._ref.onDisconnect().cancel();
  MP._ref.child('state/players/0/left').onDisconnect().set(T);
  await MP._ref.update({status:'playing'});
  MP.push();_hideMPOv();document.getElementById('GL').style.display='grid';
  renderAll();renderDots();updBtn();
  showTurnOv(players[0].name,'🎲 Spiel startet!',null);checkSignal(Date.now());
  ss(esc(players[0].name)+' beginnt!');
  if(players[0].isAI)setTimeout(()=>aiTurn(),1800);
};
