<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chartster</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#53f6ff;--pink:#ff4fd8;--purple:#8f5fff;
  --bg:#07000f;--glass:rgba(255,255,255,.055);--glass-b:rgba(255,255,255,.10);
  --text:rgba(240,240,255,1);--muted:rgba(240,240,255,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Outfit',sans-serif;background:var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 40%,rgba(143,95,255,.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 15%,rgba(83,246,255,.12) 0%,transparent 60%),
    radial-gradient(ellipse 45% 45% at 65% 85%,rgba(255,79,216,.12) 0%,transparent 60%);
  min-height:100vh;color:var(--text)}
.screen{display:none;min-height:100vh;padding:16px;align-items:center;justify-content:flex-start;flex-direction:column}
.screen.active{display:flex}
.card{width:100%;max-width:480px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--glass-b);border-radius:24px;padding:28px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative}
.sep{width:100%;height:1px;background:var(--glass-b)}
.game-title{font-size:38px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(83,246,255,.4))}
.label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.btn{width:100%;padding:14px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;border:none;outline:none;-webkit-appearance:none;touch-action:manipulation;user-select:none}
.btn[disabled]{opacity:.35;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,rgba(83,246,255,.15),rgba(143,95,255,.15));color:var(--cyan);border:1px solid rgba(83,246,255,.4);box-shadow:0 0 20px rgba(83,246,255,.12)}
.btn-primary:active{box-shadow:0 0 32px rgba(83,246,255,.4);border-color:var(--cyan)}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--glass-b)}
.btn-secondary:active{background:rgba(255,255,255,.13)}
.btn-muted{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid rgba(255,255,255,.06);font-size:14px}
.btn-muted:active{background:rgba(255,255,255,.08);color:var(--text)}

/* SETUP */
.setup-section{width:100%;display:flex;flex-direction:column;gap:8px}
.tc-row{display:flex;gap:8px;justify-content:center}
.tc-btn{width:46px;height:46px;border-radius:12px;border:1px solid var(--glass-b);background:var(--glass);color:var(--muted);font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.tc-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(83,246,255,.1);box-shadow:0 0 16px rgba(83,246,255,.2)}
.team-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.team-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.team-input{flex:1;background:var(--glass);border:1px solid var(--glass-b);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.team-input:focus{border-color:var(--cyan)}
.filter-wrap{display:flex;flex-wrap:wrap;gap:7px}
.flt{padding:7px 13px;border-radius:10px;border:1px solid var(--glass-b);background:var(--glass);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.flt.on{border-color:var(--purple);color:var(--purple);background:rgba(143,95,255,.12)}
.flt.off{opacity:.3;pointer-events:none}

/* WHEEL */
.wheel-wrap{position:relative;width:280px;height:280px;margin:8px auto}
#wheel-svg{width:280px;height:280px}
.wheel-ptr{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:22px solid var(--cyan);filter:drop-shadow(0 0 8px var(--cyan));z-index:5}
@keyframes glow-in{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.year-big-result{font-size:72px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(83,246,255,.5));animation:glow-in .4s ease}

/* GAME LAYOUT */
#screen-game{padding:8px;align-items:stretch;justify-content:flex-start}
#game-wrap{width:100%;display:grid;gap:10px;grid-template-columns:1fr 460px 1fr;align-items:start}
@media(max-width:700px){
  #game-wrap{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
  #game-center{grid-column:1/-1;grid-row:1}
  #panels-left{grid-column:1;grid-row:2}
  #panels-right{grid-column:2;grid-row:2}
}
@media(max-width:450px){
  #game-wrap{grid-template-columns:1fr}
  #game-center{order:1}
  #panels-left{order:2}
  #panels-right{order:3}
}

/* RIGHT PANELS: permanently rotated for opposite-side players */
#panels-right{transform:rotate(180deg);transform-origin:center center}

/* CENTER: auto-rotates when right-side team is active */
#game-center{display:flex;flex-direction:column;gap:10px;transition:transform .5s ease}
#game-center.facing-right{transform:rotate(180deg)}

/* TEAM PANEL */
.t-panel{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glass-b);border-radius:20px;padding:14px;display:flex;flex-direction:column;gap:9px;margin-bottom:8px;transition:border-color .3s,box-shadow .3s}
.t-panel.active-team{box-shadow:0 0 28px rgba(83,246,255,.15)}
.p-head{display:flex;align-items:center;gap:9px}
.p-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#07000f;flex-shrink:0}
.p-name{font-weight:700;font-size:14px;flex:1}
.p-tokens{display:flex;gap:3px}
.coin{width:17px;height:17px;border-radius:50%;border:2px solid;font-size:8px;font-weight:800;color:#07000f;display:flex;align-items:center;justify-content:center;cursor:pointer}
.coin.empty{background:transparent!important;opacity:.2}
.active-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:6px;text-align:center}
.year-chips{display:flex;flex-wrap:wrap;gap:4px}
.y-chip{height:26px;min-width:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.y-chip.empty{background:rgba(255,255,255,.03);color:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.06)}
.y-chip.filled{color:#07000f}

/* BANNER */
.banner{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glass-b);border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.banner-info{flex:1}
.banner-team{font-size:16px;font-weight:800}
.banner-comment{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}

/* COUNTDOWN */
#countdown-bar-wrap{width:100%;background:var(--glass);border:1px solid var(--glass-b);border-radius:12px;padding:10px 12px;display:none;flex-direction:column;gap:6px}
#countdown-bar-wrap.show{display:flex}
.cd-top{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600}
.cd-track{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.cd-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .1s linear}

/* HITSTER PANEL */
#hitster-panel{background:var(--glass);border:1px solid rgba(255,79,216,.2);border-radius:16px;padding:12px 14px;display:none;flex-direction:column;gap:8px}
#hitster-panel.show{display:flex}
.hst-title{font-size:12px;font-weight:700;color:var(--pink);text-transform:uppercase;letter-spacing:.06em}
.hst-teams{display:flex;flex-wrap:wrap;gap:8px}
.hst-bet-btn{padding:7px 12px;border-radius:10px;border:2px solid;background:transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.hst-bet-btn.placed{opacity:.5;pointer-events:none}

/* YEAR TIMELINE */
#year-tl{background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:12px;display:none;flex-wrap:wrap;gap:5px;align-items:center;justify-content:center;min-height:52px}
#year-tl.show{display:flex}
.tl-chip{padding:5px 11px;border-radius:9px;font-size:13px;font-weight:700;color:#07000f;position:relative}
.tl-box{width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;position:relative}
.tl-box.sel{border-color:#fff;background:rgba(255,255,255,.18)}
.bet-dots{position:absolute;top:-5px;right:-5px;display:flex;gap:2px}
.bet-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.4)}

/* GAME CARD */
.game-card{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glass-b);border-radius:24px;padding:24px 18px 18px;display:flex;flex-direction:column;align-items:center;gap:14px}
.c-info{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:88px;justify-content:center}
.team-name-big{font-size:clamp(26px,7vw,52px);font-weight:900;line-height:1;text-align:center;transition:opacity .3s,font-size .3s}
.team-name-big.gone{opacity:0;font-size:0;min-height:0}
.card-comment{font-size:13px;color:var(--muted);text-align:center;transition:opacity .3s;line-height:1.4}
.card-comment.gone{opacity:0}
.year-reveal{font-size:72px;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 24px rgba(83,246,255,.5));animation:glow-in .4s ease}
.rev-artist{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2vw,15px);font-weight:700;color:var(--text);text-align:center;opacity:0;transition:opacity .4s ease .3s}
.rev-title{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2vw,15px);font-weight:400;color:var(--cyan);text-align:center;opacity:0;transition:opacity .4s ease .45s}
.rev-artist.on,.rev-title.on{opacity:1}

/* SPOTIFY */
.player-outer{position:relative;width:100%;height:152px;border-radius:14px;overflow:hidden;border:1px solid rgba(83,246,255,.2);box-shadow:0 0 24px rgba(83,246,255,.08);opacity:0;pointer-events:none;transition:opacity .3s ease}
.player-outer.show{opacity:1;pointer-events:auto}
.player-outer iframe{position:absolute;top:0;left:0;width:100%;height:152px;border:none}
#sp-overlay.gone{opacity:0}
.sp-ot{position:absolute;top:0;left:0;width:100%;height:95px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;z-index:11;transition:opacity .45s ease}
.sp-ot.gone{opacity:0}
.sp-name{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.sp-q{font-size:13px;color:rgba(255,255,255,.4);text-align:center}

/* TOKEN BUTTON + NEUER SONG */
.token-row{width:100%;display:flex;gap:8px;align-items:center}
.btn-new-song{flex:1;padding:11px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:rgba(143,95,255,.1);color:var(--purple);border:1px solid rgba(143,95,255,.3)}
.btn-new-song[disabled]{opacity:.3;pointer-events:none}
.btn-new-song:active{background:rgba(143,95,255,.22)}

/* SCORING */
.score-btns{width:100%;display:none;flex-direction:column;gap:8px}
.score-btns.show{display:flex}
.s-year{background:rgba(83,246,255,.1);color:var(--cyan);border:1px solid rgba(83,246,255,.3);padding:14px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.s-year:active{background:rgba(83,246,255,.2)}
.s-both{background:rgba(255,79,216,.1);color:var(--pink);border:1px solid rgba(255,79,216,.3);padding:14px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.s-both:active{background:rgba(255,79,216,.2)}
.s-none{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.07);padding:12px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.s-none:active{background:rgba(255,255,255,.09)}

/* HINT TOAST */
#hint-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,79,216,.18);border:1px solid rgba(255,79,216,.4);color:var(--pink);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:800;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;white-space:nowrap}
#hint-toast.show{opacity:1}

/* IN-GAME FILTER */
#ingame-filter{width:100%;background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:12px 14px}
#ingame-filter summary{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;list-style:none}
#ingame-filter summary::-webkit-details-marker{display:none}

/* TRANSITION */
#screen-transition .card{max-width:420px;margin-top:15vh;text-align:center;gap:18px}
.tr-from{font-size:13px;color:var(--muted)}
.tr-arrow{font-size:28px;color:var(--muted)}
.tr-to{font-size:34px;font-weight:900}
.tr-comment{font-size:14px;color:var(--muted);line-height:1.6}

/* CARL CHARTSTER */
#carl{position:fixed;bottom:16px;left:16px;z-index:850;cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px}
#carl-emoji{font-size:36px;display:block;animation:carl-idle 5s ease-in-out infinite}
@keyframes carl-idle{0%,80%,100%{transform:translateY(0) rotate(0deg)}85%{transform:translateY(-5px) rotate(-4deg)}90%{transform:translateY(-2px) rotate(3deg)}95%{transform:translateY(-4px) rotate(-2deg)}}
@keyframes carl-impatient{0%{transform:translateY(0) rotate(0deg)}15%{transform:translateY(-10px) rotate(-8deg)}30%{transform:translateY(-2px) rotate(6deg)}45%{transform:translateY(-8px) rotate(-5deg)}60%{transform:translateY(-1px) rotate(4deg)}75%{transform:translateY(-6px) rotate(-3deg)}100%{transform:translateY(0) rotate(0deg)}}
#carl.impatient #carl-emoji{animation:carl-impatient .7s ease-in-out 3}
#carl-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.05em}
#carl-bubble{position:fixed;bottom:76px;left:16px;background:rgba(15,5,30,.95);backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:16px;padding:14px;z-index:851;display:none;flex-direction:column;gap:8px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#carl-bubble.show{display:flex}
.carl-opt{padding:10px 12px;border-radius:10px;border:1px solid var(--glass-b);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .2s}
.carl-opt:active{background:rgba(255,255,255,.12)}
#carl-confirm{position:fixed;bottom:76px;left:16px;background:rgba(15,5,30,.97);backdrop-filter:blur(16px);border:1px solid rgba(255,79,216,.3);border-radius:16px;padding:14px;z-index:852;display:none;flex-direction:column;gap:8px;min-width:220px}
#carl-confirm.show{display:flex}
.carl-confirm-btns{display:flex;gap:8px}
.carl-confirm-btns button{flex:1;padding:9px;border-radius:9px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none}

/* CONFETTI */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:700;overflow:hidden}
@keyframes cf-fall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(900deg);opacity:0}}

/* VICTORY OVERLAY */
#victoryOverlay{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);z-index:999;overflow:hidden}
#victoryOverlay.show{display:flex}
@keyframes zoomIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.vstage{display:none;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:40px 20px;text-align:center;animation:zoomIn .5s ease}
.vstage.active{display:flex}
.v-comment{font-size:clamp(20px,5vw,42px);font-weight:900;line-height:1.2;text-shadow:0 0 30px currentColor}
.v-place{font-size:clamp(36px,10vw,80px);font-weight:900;line-height:1;text-shadow:0 0 30px currentColor}
.v-card{min-width:260px;padding:28px;border-radius:24px;background:rgba(20,20,40,.9);border:2px solid rgba(255,255,255,.15);text-align:center}
.v-name{font-size:clamp(24px,6vw,44px);font-weight:900;margin-bottom:8px}
.v-score{font-size:clamp(36px,9vw,72px);font-weight:900;line-height:1}
.v-score-label{font-size:14px;color:var(--muted);margin-top:4px}
.vgold{color:#ffd84d;border-color:#ffd84d;box-shadow:0 0 60px rgba(255,216,77,.5)}
.vsilver{color:#dce8ff;border-color:#dce8ff;box-shadow:0 0 50px rgba(200,220,255,.4)}
.vbronze{color:#ffb36b;border-color:#ffb36b;box-shadow:0 0 50px rgba(255,180,100,.4)}
.vfinal-btn{padding:16px 28px;border:none;border-radius:16px;font-size:18px;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--purple),var(--pink));font-family:'Outfit',sans-serif}

.version{position:fixed;bottom:8px;right:12px;font-size:10px;color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="confetti"></div>
<div class="version">v2.0</div>
<div id="hint-toast"></div>

<!-- CARL CHARTSTER -->
<div id="carl" onclick="carlClick()">
  <span id="carl-emoji">👨‍⚖️</span>
  <span id="carl-label">Carl</span>
</div>
<div id="carl-bubble">
  <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:2px">⚖️ Carl Chartster</div>
  <button class="carl-opt" onclick="carlNewSong()">🃏 Neuer Song für <span id="carl-cur-team">Team</span><br><span style="font-size:11px;font-weight:400;color:var(--muted)">Schiedsrichter – kein Token</span></button>
  <button class="carl-opt" onclick="carlResetPrompt()" style="color:var(--pink)">🔄 Spiel zurücksetzen</button>
  <button class="carl-opt btn-muted" onclick="closeBubble()" style="font-size:12px;color:var(--muted)">✕ Schließen</button>
</div>
<div id="carl-confirm">
  <div style="font-size:14px;font-weight:600;color:var(--pink)">Wirklich zurücksetzen?</div>
  <div style="font-size:12px;color:var(--muted)">Alle Punkte gehen verloren.</div>
  <div class="carl-confirm-btns">
    <button onclick="doReset()" style="background:var(--pink);color:#07000f">Ja, reset!</button>
    <button onclick="closeBubble()" style="background:rgba(255,255,255,.1);color:var(--text)">Abbrechen</button>
  </div>
</div>
<div id="victoryOverlay"></div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
<div class="card" style="max-width:480px;margin-top:28px">
  <div class="game-title">Chartster</div>
  <div class="sep"></div>
  <div class="setup-section">
    <div class="label">Anzahl Teams</div>
    <div class="tc-row" id="tc-row">
      <button class="tc-btn" onclick="setTC(2)">2</button>
      <button class="tc-btn on" onclick="setTC(3)">3</button>
      <button class="tc-btn" onclick="setTC(4)">4</button>
      <button class="tc-btn" onclick="setTC(5)">5</button>
      <button class="tc-btn" onclick="setTC(6)">6</button>
    </div>
  </div>
  <div class="setup-section">
    <div class="label">Teamnamen</div>
    <div id="team-inputs"></div>
  </div>
  <div class="setup-section">
    <div class="label">Chartsjahre</div>
    <div class="filter-wrap" id="flt-wrap">
      <button class="flt on" data-f="all"   onclick="toggleFlt(this)">Alle</button>
      <button class="flt"    data-f="70"    onclick="toggleFlt(this)">70er</button>
      <button class="flt"    data-f="80"    onclick="toggleFlt(this)">80er</button>

var G={

  songs:[],deck:[],
  teams:[],cur:0,
  phase:1,cardLoaded:false,readyToReveal:false,

// ══ FIREBASE LOBBY ══════════════════════════
REF.once('value').then(snap=>{
  var d=snap.val();
  if(!d||!d.host||d.screen==='lobby'){
    IS_HOST=true;
    REF.update({host:Date.now(),screen:'lobby'});
    document.getElementById('lobby-status').textContent='Host';

  } else {

    document.getElementById('start-btn').disabled=true;
    REF.on('value',snap=>{var d=snap.val();if(d)applyRemote(d);});
  }
});
function applyRemote(d){
  if(d.screen&&d.screen!==G.screen){
    if(d.screen==='game'&&d.teams){
      G.teams=d.teams;G.cur=d.cur||0;G.phase=1;
      G.currentCard=d.card||null;
      showScreen('game');renderPanels();updateGameUI();
    }

}
function pushState(){
  if(!IS_HOST)return;

}

// ══ SONGS ══════════════════════════════════
function loadSongs(){
  fetch('songs.json')
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(data=>{
      G.songs=data.filter(s=>s.l);
      document.getElementById('start-btn').disabled=false;
      document.getElementById('lobby-status').textContent=`${G.songs.length} Songs · Host`;
    })
    .catch(e=>{
      document.getElementById('lobby-status').textContent='⚠ songs.json nicht gefunden';
    });
}

function filteredSongs(){
  var s=G.songs.filter(x=>x.l);
  // If only 'all' active and no top filter: return everything
  var dec=DECADES.filter(d=>G.filters.has(d));
  if(G.filters.has('all')&&!G.filters.has('top10')&&!G.filters.has('top20')) return s;
  // Apply decade filter
  if(dec.length>0){
    s=s.filter(x=>dec.some(d=>{
      if(d==='70')return x.y>=1970&&x.y<1980;
      if(d==='80')return x.y>=1980&&x.y<1990;
      if(d==='90')return x.y>=1990&&x.y<2000;
      if(d==='00')return x.y>=2000&&x.y<2010;
      if(d==='10')return x.y>=2010&&x.y<2020;
      if(d==='20')return x.y>=2020;
      return false;
    }));
  }
  if(G.filters.has('top10'))s=s.filter(x=>x.p<=10);
  else if(G.filters.has('top20'))s=s.filter(x=>x.p<=20);
  return s;
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ══ SETUP UI ══════════════════════════════
function setTC(n){
  G.tc=n;
  document.querySelectorAll('.tc-btn').forEach(b=>b.classList.toggle('on',+b.textContent===n));
  renderTeamInputs();
}
function renderTeamInputs(){
  var c=document.getElementById('team-inputs');c.innerHTML='';
  for(var i=0;i<G.tc;i++){
    c.innerHTML+=`<div class="team-row">
      <div class="team-dot" style="background:${COLORS[i]}"></div>
      <input class="team-input" placeholder="${DEFAULTS[i]}" value="${DEFAULTS[i]}" data-i="${i}">
    </div>`;
  }
}
function toggleFlt(btn,isGame){
  var f=btn.dataset.f;
  if(f==='all'){G.filters=new Set(['all']);}
  else if(f==='top10'){G.filters.delete('all');G.filters.delete('top20');G.filters.has('top10')?G.filters.delete('top10'):G.filters.add('top10');}
  else if(f==='top20'){G.filters.delete('all');G.filters.delete('top10');G.filters.has('top20')?G.filters.delete('top20'):G.filters.add('top20');}
  else{
    G.filters.delete('all');
    G.filters.has(f)?G.filters.delete(f):G.filters.add(f);
    if(G.filters.size===0)G.filters.add('all');
  }
  syncFltUI('flt-wrap');syncFltUI('flt-wrap-game');
  // Reshuffle deck if in-game filter changed
  if(isGame){var pool=filteredSongs();if(pool.length>=5)G.deck=shuffle(pool);}
}
function syncFltUI(wid){
  var w=document.getElementById(wid);if(!w)return;
  w.querySelectorAll('.flt').forEach(b=>{b.classList.toggle('on',G.filters.has(b.dataset.f));b.classList.remove('off');});
  if(G.filters.has('all')){DECADES.forEach(d=>{var el=w.querySelector(`[data-f="${d}"]`);if(el)el.classList.add('off');});}
  var t10=w.querySelector('[data-f="top10"]'),t20=w.querySelector('[data-f="top20"]');
  if(G.filters.has('top10')&&t20)t20.classList.add('off');
  if(G.filters.has('top20')&&t10)t10.classList.add('off');
}
function buildGameFilter(){
  var w=document.getElementById('flt-wrap-game');
  w.innerHTML=document.getElementById('flt-wrap').innerHTML;
  w.querySelectorAll('.flt').forEach(b=>{b.onclick=function(){toggleFlt(b,true);};});
  syncFltUI('flt-wrap-game');
}

// ══ START GAME ══════════════════════════════
function startGame(){
  var inputs=document.querySelectorAll('#team-inputs .team-input');
  G.teams=[];
  inputs.forEach((inp,i)=>G.teams.push({name:inp.value.trim()||DEFAULTS[i],color:COLORS[i],years:[],tokens:2}));
  var pool=filteredSongs();
  if(pool.length<10){showHint('Zu wenige Songs mit diesen Filtern!');return;}
  G.deck=shuffle(pool);
  G.wTeam=0;G.wYears=[];
  showScreen('wheel');buildWheel();updateWheelUI();
}

// ══ WHEEL ══════════════════════════════════
var WYEARS=[];(function(){for(var y=1960;y<=2026;y+=4)WYEARS.push(y);})();
function buildWheel(){
  var svg=document.getElementById('wheel-svg');
  var n=WYEARS.length,cx=140,cy=140,r=128,step=2*Math.PI/n,h='';
  for(var i=0;i<n;i++){
    var a1=-Math.PI/2+i*step,a2=a1+step;
    var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    var col=i%2===0?'rgba(83,246,255,.18)':'rgba(143,95,255,.18)';
    h+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 0,1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${col}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
    var la=a1+step/2,lx=cx+r*.65*Math.cos(la),ly=cy+r*.65*Math.sin(la);
    h+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(240,240,255,.75)" font-size="10" font-family="Outfit,sans-serif" font-weight="700">${WYEARS[i]}</text>`;
  }
  svg.innerHTML=h;
}
var wRot=0,wSpinning=false;
function spinWheel(){
  if(wSpinning)return;wSpinning=true;
  document.getElementById('wh-spin-btn').disabled=true;
  document.getElementById('wh-result').style.display='none';
  var extra=1440+Math.random()*1440,dur=3200,start=null,from=wRot,to=wRot+extra;
  function ease(t){return 1-Math.pow(1-t,4);}
  (function step(ts){
    if(!start)start=ts;
    var p=Math.min((ts-start)/dur,1);
    wRot=from+(to-from)*ease(p);
    document.getElementById('wheel-svg').style.transform=`rotate(${wRot}deg)`;
    if(p<1)requestAnimationFrame(step);else wheelDone();
  })(performance.now());
}
function wheelDone(){
  wSpinning=false;
  var n=WYEARS.length,norm=((wRot%360)+360)%360,ptr=(360-norm+270)%360;
  var idx=Math.floor(ptr/(360/n))%n;
  var year=Math.max(1960,Math.min(2026,WYEARS[idx]+Math.floor(Math.random()*4)));
  G.wYears.push(year);
  var el=document.getElementById('wh-result');
  el.textContent=year;el.style.display='block';el.style.color=G.teams[G.wTeam].color;
  document.getElementById('wh-spin-btn').style.display='none';
  document.getElementById('wh-next-btn').style.display='block';
}
function updateWheelUI(){
  var team=G.teams[G.wTeam];
  var el=document.getElementById('wh-team');el.textContent=team.name;el.style.color=team.color;
  document.getElementById('wh-spin-btn').style.display='block';
  document.getElementById('wh-spin-btn').disabled=false;
  document.getElementById('wh-next-btn').style.display='none';
  document.getElementById('wh-result').style.display='none';
}
function nextWheelTeam(){
  G.wTeam++;
  if(G.wTeam>=G.teams.length){
    G.teams.forEach((t,i)=>{t.years=[G.wYears[i]];});
    G.cur=G.wYears.indexOf(Math.min(...G.wYears));
    beginPlay();
  }else{updateWheelUI();}
}

// ══ PLAY ══════════════════════════════════
function beginPlay(){
  G.phase=1;G.cardLoaded=false;G.readyToReveal=false;G.selBox=null;G.bets={};G.betMode=null;G.cdDone=false;
  clearCd();

  G.currentCard=G.deck.pop();
  showScreen('game');buildGameFilter();renderPanels();updateGameUI();pushState();
}
function drawCard(){
  if(G.deck.length===0)G.deck=shuffle(filteredSongs());

// ══ PANELS ══════════════════════════════
function renderPanels(){
  var L=document.getElementById('panels-left'),R=document.getElementById('panels-right');
  L.innerHTML='';R.innerHTML='';
  G.teams.forEach((team,i)=>{(i%2===0?L:R).innerHTML+=panelHTML(team,i);});
  // Auto-rotate center based on active team side
  var isRight=(G.cur%2===1);
  document.getElementById('game-center').classList.toggle('facing-right',isRight);
}
function panelHTML(team,idx){
  var isA=(idx===G.cur);
  var tH='';
  for(var t=0;t<MAX_TOK;t++){
    var f=t<team.tokens;
    tH+=`<div class="coin ${f?'':'empty'}" style="background:${f?team.color:'transparent'};border-color:${team.color}">¢</div>`;
  }
  var chips='';
  var sorted=team.years.slice().sort((a,b)=>a-b);
  for(var s=0;s<WIN;s++){
    chips+=sorted[s]!==undefined
      ?`<div class="y-chip filled" style="background:${team.color}">${sorted[s]}</div>`
      :`<div class="y-chip empty">—</div>`;
  }
  var bStyle=isA?`border-color:${team.color};box-shadow:0 0 24px ${team.color}28`:'';
  return `<div class="t-panel ${isA?'active-team':''}" style="${bStyle}">
    <div class="p-head">
      <div class="p-avatar" style="background:${team.color}">${team.name.substring(0,2).toUpperCase()}</div>
      <div class="p-name" style="color:${team.color}">${team.name}</div>
      <div class="p-tokens">${tH}</div>
    </div>
    ${isA?`<div class="active-badge" style="background:${team.color}22;color:${team.color}">▶ AM ZUG</div>`:''}
    <div class="year-chips">${chips}</div>
  </div>`;
}

function updateGameUI(){

  document.getElementById('banner-name').style.color=team.color;
  document.getElementById('banner-comment').textContent=comment('p1',team);
  document.getElementById('c-team-name').textContent=team.name;
  document.getElementById('c-team-name').style.color=team.color;
  document.getElementById('c-team-name').classList.remove('gone');
  document.getElementById('c-comment').textContent=comment('p1',team);
  document.getElementById('c-comment').classList.remove('gone');
  document.getElementById('c-year').style.display='none';
  document.getElementById('c-artist').classList.remove('on');
  document.getElementById('c-title').classList.remove('on');
  document.getElementById('player-outer').classList.remove('show');
  document.getElementById('sp-overlay').classList.remove('gone');
  document.getElementById('sp-ot').classList.remove('gone');
  document.getElementById('sp-frame').src='';
  document.getElementById('sp-team').textContent=team.name;
  document.getElementById('sp-team').style.color=team.color;
  document.getElementById('year-tl').classList.remove('show');
  document.getElementById('countdown-bar-wrap').classList.remove('show');
  document.getElementById('hitster-panel').classList.remove('show');
  document.getElementById('token-row').style.display='none';
  var btn=document.getElementById('main-btn');
  btn.textContent='Wir sind bereit …';btn.className='btn btn-primary';btn.style.display='';
  document.getElementById('score-btns').classList.remove('show');
  // Carl: update team name
  document.getElementById('carl-cur-team').textContent=team.name;
}

// ══ COUNTDOWN ══════════════════════════
function startCountdown(){
  G.cdRemain=CD_SECS;G.cdDone=false;
  var wrap=document.getElementById('countdown-bar-wrap');
  wrap.classList.add('show');
  var fill=document.getElementById('cd-fill');
  var secs=document.getElementById('cd-secs');
  fill.style.width='100%';
  secs.textContent=G.cdRemain;
  G.cdTimer=setInterval(function(){
    G.cdRemain--;
    fill.style.width=(G.cdRemain/CD_SECS*100)+'%';
    secs.textContent=G.cdRemain;
    if(G.cdRemain<=0){
      clearCd();G.cdDone=true;G.readyToReveal=true;
      wrap.classList.remove('show');
      document.getElementById('hitster-panel').classList.remove('show');
      document.getElementById('main-btn').disabled=false;
      document.getElementById('cd-label').textContent='✅ Jetzt aufdecken!';
    }
  },1000);
}
function clearCd(){clearInterval(G.cdTimer);G.cdTimer=null;}

// ══ HITSTER PANEL ══════════════════════
function renderHitsterPanel(){
  var panel=document.getElementById('hitster-panel');
  var teams=document.getElementById('hst-teams');
  teams.innerHTML='';
  var any=false;
  G.teams.forEach(function(team,i){
    if(i===G.cur||team.tokens<=0)return;
    any=true;
    var placed=G.bets.hasOwnProperty(i);
    teams.innerHTML+=`<button class="hst-bet-btn ${placed?'placed':''}"
      style="color:${team.color};border-color:${team.color};background:${team.color}15"
      onclick="startBetMode(${i})" ${placed?'disabled':''}>
      ${team.name.split(' ')[1]||team.name} HITSTER! (${team.tokens} ¢)
    </button>`;
  });
  if(any)panel.classList.add('show');
}

function startBetMode(teamIdx){
  G.betMode=teamIdx;
  showHint(`${G.teams[teamIdx].name}: Jetzt Checkbox auswählen!`);
}

function placeBet(checkboxIdx){
  if(G.betMode===null)return;
  var teamIdx=G.betMode;
  if(G.teams[teamIdx].tokens<=0)return;
  G.teams[teamIdx].tokens--;
  G.bets[teamIdx]=checkboxIdx;
  G.betMode=null;
  renderPanels();
  renderTimeline();
  renderHitsterPanel();
}

// ══ CARD PHASES ══════════════════════════
function cardNext(){
  if(G.phase===1){
    G.phase=2;
    document.getElementById('c-team-name').classList.add('gone');
    document.getElementById('c-comment').classList.add('gone');
    document.getElementById('player-outer').classList.add('show');
    updateHole();
    renderTimeline();
    document.getElementById('year-tl').classList.add('show');
    document.getElementById('token-row').style.display='flex';
    updateNewSongBtn();
    renderHitsterPanel();
    if(!G.cardLoaded){
      document.getElementById('sp-frame').src='https://open.spotify.com/embed/track/'+G.currentCard.l+'?utm_source=generator&theme=0&autoplay=1';
      G.cardLoaded=true;
    }
    document.getElementById('sp-comment').textContent=comment('p2',G.teams[G.cur]);
    G.readyToReveal=false;
    var btn=document.getElementById('main-btn');
    btn.textContent='Aufdecken';btn.className='btn btn-secondary';btn.disabled=true;
    startCountdown();
  } else if(G.phase===2){
    // Guard: checkbox must be selected
    if(G.selBox===null){
      showHint('Bitte erst eine Position im Zeitstrahl markieren!');return;
    }
    if(!G.readyToReveal){
      showHint('Noch kurz warten – Countdown läuft noch!');return;
    }
    // Reveal
    G.phase=3;
    clearCd();
    document.getElementById('sp-overlay').classList.add('gone');
    document.getElementById('sp-ot').classList.add('gone');
    document.getElementById('token-row').style.display='none';
    // Keep timeline visible in phase 3
    document.getElementById('year-tl').classList.add('show');
    var yr=document.getElementById('c-year');
    yr.textContent=G.currentCard.y;yr.style.display='block';
    document.getElementById('c-artist').textContent=G.currentCard.a;
    document.getElementById('c-title').textContent=G.currentCard.t;
    setTimeout(function(){
      document.getElementById('c-artist').classList.add('on');
      document.getElementById('c-title').classList.add('on');
    },50);
    document.getElementById('main-btn').style.display='none';
    document.getElementById('score-btns').classList.add('show');
  }
}

// ══ YEAR TIMELINE ══════════════════════
function renderTimeline(){
  var team=G.teams[G.cur];
  var sorted=team.years.slice().sort((a,b)=>a-b);
  var tl=document.getElementById('year-tl');
  tl.innerHTML='';G.selBox=null;
  tl.appendChild(mkBox(0,sorted));
  sorted.forEach(function(year,i){
    var chip=document.createElement('div');
    chip.className='tl-chip';chip.style.background=team.color;chip.textContent=year;
    tl.appendChild(chip);tl.appendChild(mkBox(i+1,sorted));
  });
}
function mkBox(idx,sorted){
  var el=document.createElement('div');
  el.className='tl-box';el.dataset.idx=idx;
  // Bet dots
  var dotsH='<div class="bet-dots">';
  for(var ti in G.bets){
    if(parseInt(G.bets[ti])===idx){
      dotsH+=`<div class="bet-dot" style="background:${G.teams[parseInt(ti)].color}"></div>`;
    }
  }
  dotsH+='</div>';
  el.innerHTML=dotsH;
  el.onclick=(function(i){return function(){
    if(G.betMode!==null){placeBet(i);return;}
    document.querySelectorAll('.tl-box').forEach(b=>b.classList.remove('sel'));
    el.classList.add('sel');G.selBox=i;
  };})(idx);
  return el;
}
function getCorrectPos(cardYear,sortedYears){
  for(var i=0;i<sortedYears.length;i++){if(cardYear<sortedYears[i])return i;}
  return sortedYears.length;
}

// ══ SCORING ════════════════════════════
function score(type){
  var team=G.teams[G.cur];
  var sorted=team.years.slice().sort((a,b)=>a-b);
  var correctPos=getCorrectPos(G.currentCard.y,sorted);

  if(type==='year'||type==='both'){
    team.years.push(G.currentCard.y);
    team.years.sort((a,b)=>a-b);
    if(type==='both')team.tokens=Math.min(MAX_TOK,team.tokens+1);
    spawnConfetti(team.color,80);
  } else {
    // Check if any betters were correct (got the right position)
    for(var i=0;i<G.teams.length;i++){
      if(i!==G.cur&&G.bets[i]===correctPos){
        G.teams[i].years.push(G.currentCard.y);
        G.teams[i].years.sort((a,b)=>a-b);
        spawnConfetti(G.teams[i].color,60);
        showHint(`${G.teams[i].name} stehlen die Jahreszahl!`);
        break;
      }
    }
  }
  G.bets={};G.betMode=null;
  if(team.years.length>=WIN){showVictory();return;}
  showTransition();
}

// ══ NEW SONG (Token) ══════════════════
function newSongWithToken(){
  var team=G.teams[G.cur];
  if(team.tokens<=0){showHint('Keine Token mehr!');return;}
  team.tokens--;
  clearCd();
  G.deck.push(G.currentCard);G.deck=shuffle(G.deck);
  drawCard();
  G.cardLoaded=false;G.selBox=null;G.bets={};G.betMode=null;G.phase=1;
  updateGameUI();renderPanels();
  // Immediately start phase 2
  cardNext();
}
function updateNewSongBtn(){
  var team=G.teams[G.cur];
  var btn=document.getElementById('new-song-btn');
  btn.disabled=(team.tokens<=0);
  btn.textContent=`🔄 Neuer Song (${team.tokens} Token)`;
}

// ══ TRANSITION ════════════════════════
function showTransition(){
  var from=G.teams[G.cur];
  var nxt=(G.cur+1)%G.teams.length;
  var to=G.teams[nxt];
  document.getElementById('tr-from').textContent='War dran: '+from.name;
  document.getElementById('tr-to').textContent=to.name;
  document.getElementById('tr-to').style.color=to.color;
  document.getElementById('tr-comment').textContent=comment('tr',to,[from.name,from.years.length]);
  showScreen('transition');
}
function continueGame(){
  G.cur=(G.cur+1)%G.teams.length;
  G.phase=1;G.cardLoaded=false;G.readyToReveal=false;G.selBox=null;G.bets={};G.betMode=null;
  clearCd();drawCard();
  showScreen('game');renderPanels();updateGameUI();pushState();
}

// ══ VICTORY ════════════════════════════
function showVictory(){
  // Sort teams: most years, then most tokens
  var sorted=G.teams.slice().sort((a,b)=>b.years.length-a.years.length||(b.tokens-a.tokens));
  // Build podium sequence (worst → best)
  var seq=sorted.map(function(team,rank){
    var m=MEDAL_DATA[rank]||MEDAL_DATA[MEDAL_DATA.length-1];
    return{
      place:m.place,
      comment:m.comments[Math.floor(Math.random()*m.comments.length)],
      name:team.name,
      color:team.color,
      score:team.years.length+' Karten',
      tokens:team.tokens+' Token',
      cls:m.cls,cf:m.cf
    };
  }).reverse(); // worst first, best last

  var overlay=document.getElementById('victoryOverlay');
  overlay.classList.add('show');
  var stage=0;
  function renderStage(i){
    var d=seq[i];
    overlay.innerHTML=buildConfettiHTML(d.cf)+`
      <div class="vstage active ${d.cls}">
        <div class="v-comment">${d.comment}</div>
        <div class="v-place">${d.place}</div>
        <div class="v-card ${d.cls}">
          <div class="v-name" style="color:${d.color}">${d.name}</div>
          <div class="v-score" style="color:${d.color}">${d.score}</div>
          <div class="v-score-label">${d.tokens}</div>
        </div>
        ${i===seq.length-1?`<button class="vfinal-btn" onclick="location.reload()">🔄 Neues Spiel</button>`:''}
      </div>`;
    playApplause();
  }
  renderStage(0);
  var timer=setInterval(function(){
    stage++;
    if(stage>=seq.length){clearInterval(timer);return;}
    renderStage(stage);
  },3000);
  if(IS_HOST)REF.update({screen:'won'});
}

function buildConfettiHTML(n){
  var colors=['#ff4d6d','#ffd166','#06d6a0','#4cc9f0','#b5179e','#f72585','#53f6ff','#ff4fd8'];
  var shapes=['50%','4px','0'];var h='';
  for(var i=0;i<n;i++){
    var sz=7+Math.random()*14;
    h+=`<div style="position:absolute;top:-30px;left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:${shapes[i%3]};transform:rotate(${Math.random()*360}deg);animation:cf-fall ${2+Math.random()*4}s ${Math.random()*1.5}s linear forwards"></div>`;
  }
  return h;
}

// ══ CONFETTI ════════════════════════════
function spawnConfetti(color,count){
  var c=document.getElementById('confetti');
  count=count||80;
  var cols=[color,'#fff','#ffd84d',COLORS[Math.floor(Math.random()*6)]];
  for(var i=0;i<count;i++){
    var p=document.createElement('div');
    var sz=6+Math.random()*12;
    p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${['50%','3px','0'][i%3]};transform:rotate(${Math.random()*360}deg);animation:cf-fall ${1.2+Math.random()*2}s ${Math.random()*.8}s linear forwards`;
    c.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
  // Second wave
  setTimeout(()=>spawnConfetti(color,Math.floor(count*.5)),600);
}

// ══ CARL CHARTSTER ══════════════════════
var carlOpen=false;
function carlClick(){
  closeBubble();
  if(!carlOpen){
    document.getElementById('carl-cur-team').textContent=G.teams[G.cur]?G.teams[G.cur].name:'Team';
    document.getElementById('carl-bubble').classList.add('show');
    carlOpen=true;
    // Trigger impatient animation
    var carl=document.getElementById('carl');
    carl.classList.add('impatient');
    setTimeout(()=>carl.classList.remove('impatient'),2500);
  }
}
function closeBubble(){
  document.getElementById('carl-bubble').classList.remove('show');
  document.getElementById('carl-confirm').classList.remove('show');
  carlOpen=false;
}
function carlNewSong(){
  closeBubble();
  if(!G.currentCard)return;
  // Free new song (referee override)
  clearCd();
  G.deck.push(G.currentCard);G.deck=shuffle(G.deck);
  drawCard();
  G.cardLoaded=false;G.selBox=null;G.bets={};G.betMode=null;G.phase=1;
  updateGameUI();renderPanels();
  showHint('Carl sagt: Neuer Song für alle! ⚖️');
}
function carlResetPrompt(){
  document.getElementById('carl-bubble').classList.remove('show');
  document.getElementById('carl-confirm').classList.add('show');
}
function doReset(){
  closeBubble();
  clearCd();
  G.teams=[];G.deck=[];G.cur=0;G.phase=1;
  if(IS_HOST)REF.update({screen:'lobby',host:Date.now()});
  showScreen('lobby');setTC(3);renderTeamInputs();syncFltUI('flt-wrap');
  G.filters=new Set(['all']);syncFltUI('flt-wrap');
  document.getElementById('start-btn').disabled=IS_HOST?false:true;
}

// Occasionally trigger impatient animation
setInterval(function(){
  if(G.screen==='game'&&Math.random()<0.3){
    var carl=document.getElementById('carl');
    carl.classList.add('impatient');
    setTimeout(()=>carl.classList.remove('impatient'),2500);
  }
},15000);

// ══ COMMENTS ════════════════════════════
function comment(type,team,extra){
  var others=G.teams.filter((_,i)=>i!==G.cur).map(t=>t.name);
  var pool=type==='p1'?CP1:type==='p2'?CP2:type==='tr'?CPI:CPW;
  var idx=G.commentIdx%pool.length;G.commentIdx++;
  try{
    if(type==='tr'&&extra)return pool[idx](extra[0],team.name,extra[1]);
    return pool[idx](team.name,others);
  }catch(e){return pool[idx](team.name);}
}

// ══ UTILS ════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  var el=document.getElementById('screen-'+name);
  if(el){el.classList.add('active');G.screen=name;}
}
function showHint(msg){
  var el=document.getElementById('hint-toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
function rotateBanner(){
  var gc=document.getElementById('game-center');
  gc.classList.toggle('facing-right');
}
function updateHole(){
  var o=document.getElementById('player-outer');
  var w=o.offsetWidth||412,mob=window.innerWidth<600;
  var cx=mob?w-32:w-28,r=mob?18:22,cy=mob?128:124;
  document.getElementById('play-hole').setAttribute('cx',cx);
  document.getElementById('play-hole').setAttribute('r',r);
  document.getElementById('play-hole').setAttribute('cy',cy);
}
window.addEventListener('resize',updateHole);updateHole();

// ══ INIT ════════════════════════════════
setTC(3);renderTeamInputs();syncFltUI('flt-wrap');
</script>
