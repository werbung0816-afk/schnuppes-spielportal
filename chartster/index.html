<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chartster</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#53f6ff;--pink:#ff4fd8;--purple:#8f5fff;
  --bg:#07000f;
  --glass:rgba(255,255,255,0.055);
  --glass-b:rgba(255,255,255,0.10);
  --text:rgba(240,240,255,1);
  --muted:rgba(240,240,255,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 40%,rgba(143,95,255,.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 15%,rgba(83,246,255,.12) 0%,transparent 60%),
    radial-gradient(ellipse 45% 45% at 65% 85%,rgba(255,79,216,.12) 0%,transparent 60%);
  min-height:100vh;
  color:var(--text);
}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;padding:16px;align-items:center;justify-content:flex-start;flex-direction:column}
.screen.active{display:flex}

/* ── GLASS CARD ── */
.card{
  width:100%;max-width:480px;
  background:var(--glass);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--glass-b);border-radius:24px;
  padding:28px 20px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  position:relative;
}
.sep{width:100%;height:1px;background:var(--glass-b)}

/* ── TYPOGRAPHY ── */
.game-title{
  font-size:38px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--cyan),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(83,246,255,.4));
}
.label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:14px;border-radius:14px;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;
  cursor:pointer;transition:all .2s;border:none;outline:none;
  -webkit-appearance:none;touch-action:manipulation;user-select:none;
}
.btn[disabled]{opacity:.35;pointer-events:none}
.btn-primary{
  background:linear-gradient(135deg,rgba(83,246,255,.15),rgba(143,95,255,.15));
  color:var(--cyan);border:1px solid rgba(83,246,255,.4);
  box-shadow:0 0 20px rgba(83,246,255,.12);
}
.btn-primary:active{box-shadow:0 0 32px rgba(83,246,255,.4);border-color:var(--cyan)}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--glass-b)}
.btn-secondary:active{background:rgba(255,255,255,.13)}
.btn-muted{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid rgba(255,255,255,.06);font-size:14px}
.btn-muted:active{background:rgba(255,255,255,.08);color:var(--text)}

/* ── SETUP SCREEN ── */
.setup-section{width:100%;display:flex;flex-direction:column;gap:8px}
.tc-row{display:flex;gap:8px;justify-content:center}
.tc-btn{
  width:46px;height:46px;border-radius:12px;
  border:1px solid var(--glass-b);background:var(--glass);
  color:var(--muted);font-size:18px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;
}
.tc-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(83,246,255,.1);box-shadow:0 0 16px rgba(83,246,255,.2)}
.team-row{display:flex;align-items:center;gap:10px}
.team-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.team-input{
  flex:1;background:var(--glass);border:1px solid var(--glass-b);border-radius:10px;
  padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;
}
.team-input:focus{border-color:var(--cyan)}
.filter-wrap{display:flex;flex-wrap:wrap;gap:7px}
.flt{
  padding:7px 13px;border-radius:10px;border:1px solid var(--glass-b);
  background:var(--glass);color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;
}
.flt.on{border-color:var(--purple);color:var(--purple);background:rgba(143,95,255,.12)}
.flt.off{opacity:.3;pointer-events:none}

/* ── WHEEL SCREEN ── */
.wheel-wrap{position:relative;width:280px;height:280px;margin:8px auto}
#wheel-svg{width:280px;height:280px;transition:transform 0s linear}
.wheel-ptr{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:10px solid transparent;border-right:10px solid transparent;
  border-top:22px solid var(--cyan);
  filter:drop-shadow(0 0 8px var(--cyan));
  z-index:5;
}
@keyframes glow-in{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.year-big-result{
  font-size:72px;font-weight:900;line-height:1;text-align:center;
  background:linear-gradient(135deg,var(--cyan),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 24px rgba(83,246,255,.5));
  animation:glow-in .4s ease;
}

/* ── GAME LAYOUT ── */
#screen-game{padding:8px;align-items:stretch;justify-content:flex-start}
#game-wrap{
  width:100%;display:grid;gap:10px;
  grid-template-columns:1fr 460px 1fr;
  grid-template-rows:auto;
  align-items:start;
}
@media(max-width:700px){
  #game-wrap{
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;
  }
  #game-center{grid-column:1/-1;grid-row:1}
  #panels-left{grid-column:1;grid-row:2}
  #panels-right{grid-column:2;grid-row:2}
}
@media(max-width:450px){
  #game-wrap{grid-template-columns:1fr}
  #game-center{order:1}
  #panels-left{order:2}
  #panels-right{order:3}
}

/* ── TEAM PANEL ── */
.t-panel{
  background:var(--glass);backdrop-filter:blur(18px);
  border:1px solid var(--glass-b);border-radius:20px;
  padding:14px;display:flex;flex-direction:column;gap:9px;
  margin-bottom:8px;transition:border-color .3s,box-shadow .3s;
}
.t-panel.active{box-shadow:0 0 24px rgba(83,246,255,.12)}
.p-head{display:flex;align-items:center;gap:9px}
.p-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#07000f;flex-shrink:0;
}
.p-name{font-weight:700;font-size:14px;flex:1}
.p-tokens{display:flex;gap:3px}
.coin{
  width:17px;height:17px;border-radius:50%;border:2px solid;
  font-size:8px;font-weight:800;color:#07000f;
  display:flex;align-items:center;justify-content:center;
}
.coin.empty{background:transparent!important;opacity:.2}
.active-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  padding:3px 8px;border-radius:6px;text-align:center;
}
.year-chips{display:flex;flex-wrap:wrap;gap:4px}
.y-chip{
  height:26px;min-width:48px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.y-chip.empty{background:rgba(255,255,255,.03);color:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.06)}
.y-chip.filled{color:#07000f}

/* ── GAME CENTER ── */
#game-center{display:flex;flex-direction:column;gap:10px;transition:transform .4s}
.banner{
  background:var(--glass);backdrop-filter:blur(18px);
  border:1px solid var(--glass-b);border-radius:16px;
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.banner-info{flex:1}
.banner-team{font-size:16px;font-weight:800}
.banner-comment{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.rotate-btn{
  background:none;border:none;cursor:pointer;
  font-size:22px;color:var(--muted);padding:4px 8px;transition:transform .3s;
}
.rotate-btn:active{transform:rotate(180deg)}

/* ── YEAR TIMELINE ── */
#year-tl{
  background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;
  padding:12px;display:none;flex-wrap:wrap;gap:5px;
  align-items:center;justify-content:center;min-height:52px;
}
#year-tl.show{display:flex}
.tl-chip{
  padding:5px 11px;border-radius:9px;
  font-size:13px;font-weight:700;color:#07000f;
}
.tl-box{
  width:28px;height:28px;border-radius:8px;
  border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:14px;flex-shrink:0;
}
.tl-box.sel{border-color:#fff;background:rgba(255,255,255,.18)}

/* ── CARD AREA ── */
.game-card{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--glass-b);border-radius:24px;padding:24px 18px 18px;display:flex;flex-direction:column;align-items:center;gap:14px}
.c-info{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:88px;justify-content:center}
.team-name-big{font-size:clamp(28px,8vw,56px);font-weight:900;line-height:1;text-align:center;transition:opacity .3s,font-size .3s}
.team-name-big.gone{opacity:0;font-size:0;min-height:0}
.card-comment{font-size:13px;color:var(--muted);text-align:center;transition:opacity .3s}
.card-comment.gone{opacity:0}
.year-reveal{
  font-size:72px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--cyan),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 24px rgba(83,246,255,.5));
  animation:glow-in .4s ease;
}
.rev-artist{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2vw,15px);font-weight:700;color:var(--text);text-align:center;opacity:0;transition:opacity .4s ease .3s}
.rev-title{font-family:'DM Sans',sans-serif;font-size:clamp(13px,2vw,15px);font-weight:400;color:var(--cyan);text-align:center;opacity:0;transition:opacity .4s ease .45s}
.rev-artist.on,.rev-title.on{opacity:1}

/* ── SPOTIFY EMBED ── */
.player-outer{position:relative;width:100%;height:152px;border-radius:14px;overflow:hidden;border:1px solid rgba(83,246,255,.2);box-shadow:0 0 24px rgba(83,246,255,.08);opacity:0;pointer-events:none;transition:opacity .3s ease}
.player-outer.show{opacity:1;pointer-events:auto}
.player-outer iframe{position:absolute;top:0;left:0;width:100%;height:152px;border:none}
#sp-overlay.gone{opacity:0}
.sp-ot{position:absolute;top:0;left:0;width:100%;height:95px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;z-index:11;transition:opacity .45s ease}
.sp-ot.gone{opacity:0}
.sp-name{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.sp-q{font-size:13px;color:rgba(255,255,255,.4);text-align:center}

/* ── SCORING BUTTONS ── */
.score-btns{width:100%;display:none;flex-direction:column;gap:8px}
.score-btns.show{display:flex}
.s-year{background:rgba(83,246,255,.1);color:var(--cyan);border:1px solid rgba(83,246,255,.3);padding:14px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.s-year:active{background:rgba(83,246,255,.2)}
.s-both{background:rgba(255,79,216,.1);color:var(--pink);border:1px solid rgba(255,79,216,.3);padding:14px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.s-both:active{background:rgba(255,79,216,.2)}
.s-none{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.07);padding:12px;border-radius:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.s-none:active{background:rgba(255,255,255,.09)}

/* ── IN-GAME FILTER ── */
#ingame-filter{width:100%;background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
#ingame-filter summary{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;list-style:none}
#ingame-filter summary::-webkit-details-marker{display:none}

/* ── TRANSITION ── */
#screen-transition .card{max-width:420px;margin-top:15vh;text-align:center;gap:18px}
.tr-from{font-size:13px;color:var(--muted)}
.tr-arrow{font-size:28px;color:var(--muted)}
.tr-to{font-size:34px;font-weight:900}
.tr-comment{font-size:14px;color:var(--muted);line-height:1.6}

/* ── WIN SCREEN ── */
#screen-won .card{max-width:420px;margin-top:15vh;text-align:center;gap:16px}
.won-trophy{font-size:56px}
.won-name{font-size:30px;font-weight:900}
.won-comment{font-size:14px;color:var(--muted)}

/* ── CONFETTI ── */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.cf{position:absolute;width:8px;height:8px;border-radius:2px;animation:cf-fall linear forwards}
@keyframes cf-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

/* ── MISC ── */
.version{position:fixed;bottom:8px;right:12px;font-size:10px;color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="confetti"></div>
<div class="version">v1.0</div>

<!-- ════════════════════════════════════════════
     LOBBY
════════════════════════════════════════════ -->
<div id="screen-lobby" class="screen active">
<div class="card" style="max-width:480px;margin-top:28px">
  <div class="game-title">Chartster</div>
  <div class="sep"></div>

  <!-- Team count -->
  <div class="setup-section">
    <div class="label">Anzahl Teams</div>
    <div class="tc-row" id="tc-row">
      <button class="tc-btn" onclick="setTC(2)">2</button>
      <button class="tc-btn on" onclick="setTC(3)">3</button>
      <button class="tc-btn" onclick="setTC(4)">4</button>
      <button class="tc-btn" onclick="setTC(5)">5</button>
      <button class="tc-btn" onclick="setTC(6)">6</button>
    </div>
  </div>

  <!-- Team names -->
  <div class="setup-section">
    <div class="label">Teamnamen</div>
    <div id="team-inputs"></div>
  </div>

  <!-- Year filter -->
  <div class="setup-section">
    <div class="label">Chartsjahre</div>
    <div class="filter-wrap" id="flt-wrap">
      <button class="flt on" data-f="all"   onclick="toggleFlt(this)">Alle</button>
      <button class="flt"    data-f="70"    onclick="toggleFlt(this)">70er</button>
      <button class="flt"    data-f="80"    onclick="toggleFlt(this)">80er</button>
      <button class="flt"    data-f="90"    onclick="toggleFlt(this)">90er</button>
      <button class="flt"    data-f="00"    onclick="toggleFlt(this)">00er</button>
      <button class="flt"    data-f="10"    onclick="toggleFlt(this)">10er</button>
      <button class="flt"    data-f="20"    onclick="toggleFlt(this)">20er</button>
      <div style="width:100%"></div>
      <button class="flt"    data-f="top20" onclick="toggleFlt(this)">Nur Top 20</button>
      <button class="flt"    data-f="top10" onclick="toggleFlt(this)">Nur Top 10</button>
    </div>
  </div>

  <div class="sep"></div>
  <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>Spiel starten</button>
  <div id="lobby-status" style="font-size:12px;color:var(--muted);text-align:center"></div>
</div>
</div>

<!-- ════════════════════════════════════════════
     WHEEL
════════════════════════════════════════════ -->
<div id="screen-wheel" class="screen">
<div class="card" style="max-width:420px;margin-top:20px;text-align:center">
  <div style="font-size:12px;color:var(--muted)" id="wh-sub">dreht am Glücksrad</div>
  <div style="font-size:24px;font-weight:800" id="wh-team">—</div>
  <div class="wheel-wrap">
    <div class="wheel-ptr"></div>
    <svg id="wheel-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div style="min-height:88px;display:flex;align-items:center;justify-content:center" id="wh-result-wrap">
    <div class="year-big-result" id="wh-result" style="display:none"></div>
  </div>
  <button class="btn btn-primary" id="wh-spin-btn" onclick="spinWheel()">Drehen!</button>
  <button class="btn btn-muted"   id="wh-next-btn" onclick="nextWheelTeam()" style="display:none">Weiter →</button>
</div>
</div>

<!-- ════════════════════════════════════════════
     GAME
════════════════════════════════════════════ -->
<div id="screen-game" class="screen">
<div id="game-wrap">

  <!-- Left panels -->
  <div id="panels-left"></div>

  <!-- Center -->
  <div id="game-center">

    <!-- Active team banner -->
    <div class="banner">
      <div class="banner-info">
        <div class="banner-team" id="banner-name">—</div>
        <div class="banner-comment" id="banner-comment"></div>
      </div>
      <button class="rotate-btn" onclick="rotateField()" title="Drehen">⟳</button>
    </div>

    <!-- Year timeline (phase 2) -->
    <div id="year-tl"></div>

    <!-- Card -->
    <div class="game-card">
      <div class="c-info" id="c-info">
        <div class="team-name-big" id="c-team-name"></div>
        <div class="card-comment"  id="c-comment"></div>
        <div class="year-reveal"   id="c-year"    style="display:none"></div>
        <div class="rev-artist"    id="c-artist"></div>
        <div class="rev-title"     id="c-title"></div>
      </div>

      <div class="sep"></div>

      <!-- Spotify embed -->
      <div class="player-outer" id="player-outer">
        <iframe id="sp-frame" src=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          allowfullscreen></iframe>
        <svg id="sp-overlay" xmlns="http://www.w3.org/2000/svg"
          style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;border-radius:13px;overflow:hidden;transition:opacity .45s ease">
          <defs>
            <mask id="hole">
              <rect width="9999" height="152" fill="white"/>
              <circle id="play-hole" cx="374" cy="124" r="28" fill="black"/>
            </mask>
          </defs>
          <rect width="9999" height="152" fill="#121212" mask="url(#hole)" rx="13"/>
        </svg>
        <div class="sp-ot" id="sp-ot">
          <div class="sp-name" id="sp-team">Team</div>
          <div class="sp-q"   id="sp-comment">kennt Ihr den Song?</div>
        </div>
      </div>

      <!-- Main button -->
      <button class="btn btn-primary" id="main-btn" onclick="cardNext()">Wir sind bereit …</button>

      <!-- Scoring -->
      <div class="score-btns" id="score-btns">
        <button class="s-year" onclick="score('year')">📅  Jahreszahl richtig (+1 Karte)</button>
        <button class="s-both" onclick="score('both')">🌟  Interpret, Titel + Jahr (+1 Karte + 1 Token)</button>
        <button class="s-none" onclick="score('none')">Leider nicht!</button>
      </div>
    </div>

    <!-- In-game filter (collapsible) -->
    <details id="ingame-filter">
      <summary>⚙ Jahresfilter anpassen</summary>
      <div style="margin-top:8px">
        <div class="filter-wrap" id="flt-wrap-game"></div>
      </div>
    </details>

  </div><!-- /game-center -->

  <!-- Right panels -->
  <div id="panels-right"></div>

</div><!-- /game-wrap -->
</div>

<!-- ════════════════════════════════════════════
     TRANSITION
════════════════════════════════════════════ -->
<div id="screen-transition" class="screen">
<div class="card" style="max-width:420px;margin-top:15vh;text-align:center">
  <div class="tr-from"    id="tr-from">War dran: —</div>
  <div class="tr-arrow">↓</div>
  <div class="tr-to"      id="tr-to">Nächstes Team</div>
  <div class="tr-comment" id="tr-comment"></div>
  <div class="sep"></div>
  <button class="btn btn-primary" onclick="continueGame()">Los geht's →</button>
</div>
</div>

<!-- ════════════════════════════════════════════
     WIN
════════════════════════════════════════════ -->
<div id="screen-won" class="screen">
<div class="card" style="max-width:420px;margin-top:15vh;text-align:center">
  <div class="won-trophy">🏆</div>
  <div class="won-name"    id="won-name"></div>
  <div class="won-comment" id="won-comment"></div>
  <div class="sep"></div>
  <button class="btn btn-primary" onclick="resetGame()">Neues Spiel</button>
</div>
</div>

<!-- ════════════════════════════════════════════

// ══════════════════════════════════════════════

var G = {
  tc:3, filters:new Set(['all']),
  songs:[],deck:[],
  teams:[], cur:0,
  phase:1, cardLoaded:false, readyToReveal:false,

// ══════════════════════════════════════════════
// FIREBASE – LOBBY HANDSHAKE
// ══════════════════════════════════════════════
REF.once('value').then(snap=>{
  var d = snap.val();
  if(!d || !d.host || d.screen === 'lobby'){
    IS_HOST = true;
    REF.update({host: Date.now(), screen:'lobby'});
    document.getElementById('lobby-status').textContent = 'Du bist Host';
    loadSongsAndEnable();
  } else {
    IS_HOST = false;
    document.getElementById('lobby-status').textContent = 'Zuschauer – warte auf Host …';
    document.getElementById('start-btn').disabled = true;
    listenFirebase();
  }
});

function listenFirebase(){
  REF.on('value', snap=>{
    var d = snap.val();
    if(!d) return;
    if(d.screen && d.screen !== G.screen){
      applyRemoteState(d);
    }
  });
}

function applyRemoteState(d){
  // Spectators mirror host state
  if(d.screen === 'game' && d.teams && d.cur !== undefined){
    G.teams = d.teams;
    G.cur   = d.cur;
    G.phase = d.phase || 1;
    G.currentCard = d.card || null;
    G.songs = d.songs || G.songs;
    G.deck  = d.deck  || G.deck;
    showScreen('game');
    renderPanels();
    syncGameUI();
  }
}

function pushState(){
  if(!IS_HOST) return;
  REF.update({
    screen: G.screen,
    teams:  G.teams,
    cur:    G.cur,
    phase:  G.phase,
    card:   G.currentCard || null,
    deck:   G.deck.slice(0,50), // limit size
    songs:  null // don't push all songs
  });
}

// ══════════════════════════════════════════════
// SONGS
// ══════════════════════════════════════════════
function loadSongsAndEnable(){
  fetch('songs.json')
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(data=>{
      G.songs = data.filter(s=>s.l);
      document.getElementById('start-btn').disabled = false;
      document.getElementById('lobby-status').textContent =
        `${G.songs.length} Songs geladen · Host`;
    })
    .catch(e=>{
      document.getElementById('lobby-status').textContent = '⚠ songs.json nicht gefunden';
    });
}

function filteredSongs(){
  var s = G.songs;
  if(G.filters.has('all') && !G.filters.has('top10') && !G.filters.has('top20')) return s;
  var dec = DECADES.filter(d=>G.filters.has(d));
  if(dec.length) s = s.filter(x=>dec.some(d=>{
    if(d==='70') return x.y>=1970&&x.y<1980;
    if(d==='80') return x.y>=1980&&x.y<1990;
    if(d==='90') return x.y>=1990&&x.y<2000;
    if(d==='00') return x.y>=2000&&x.y<2010;
    if(d==='10') return x.y>=2010&&x.y<2020;
    if(d==='20') return x.y>=2020;
  }));
  if(G.filters.has('top10')) s = s.filter(x=>x.p<=10);
  else if(G.filters.has('top20')) s = s.filter(x=>x.p<=20);
  return s;
}

function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}
  return b;
}

// ══════════════════════════════════════════════
// SETUP UI
// ══════════════════════════════════════════════
function setTC(n){
  G.tc = n;
  document.querySelectorAll('.tc-btn').forEach(b=>b.classList.toggle('on',+b.textContent===n));
  renderTeamInputs();
}

function renderTeamInputs(){
  var c=document.getElementById('team-inputs'); c.innerHTML='';
  for(var i=0;i<G.tc;i++){
    c.innerHTML+=`<div class="team-row" style="margin-bottom:6px">
      <div class="team-dot" style="background:${COLORS[i]}"></div>
      <input class="team-input" placeholder="${DEFAULTS[i]}" value="${DEFAULTS[i]}" data-i="${i}">
    </div>`;
  }
}

function toggleFlt(btn, isGame){
  var f = btn.dataset.f;
  var wrapId = isGame ? 'flt-wrap-game' : 'flt-wrap';
  if(f==='all'){
    G.filters = new Set(['all']);
  } else if(f==='top10'){
    G.filters.delete('all'); G.filters.delete('top20');
    G.filters.has('top10')?G.filters.delete('top10'):G.filters.add('top10');
  } else if(f==='top20'){
    G.filters.delete('all'); G.filters.delete('top10');
    G.filters.has('top20')?G.filters.delete('top20'):G.filters.add('top20');
  } else {
    G.filters.delete('all');
    G.filters.has(f)?G.filters.delete(f):G.filters.add(f);
    if(G.filters.size===0) G.filters.add('all');
  }
  syncFilterBtns(wrapId);
  if(isGame) syncFilterBtns('flt-wrap');
  else       syncFilterBtns('flt-wrap-game');
}

function syncFilterBtns(wrapId){
  var wrap = document.getElementById(wrapId);
  if(!wrap) return;
  wrap.querySelectorAll('.flt').forEach(b=>{
    b.classList.toggle('on', G.filters.has(b.dataset.f));
    b.classList.remove('off');
  });
  if(G.filters.has('all')){
    DECADES.forEach(d=>{ var el=wrap.querySelector(`[data-f="${d}"]`); if(el) el.classList.add('off'); });
  }
  var t10=wrap.querySelector('[data-f="top10"]'), t20=wrap.querySelector('[data-f="top20"]');
  if(G.filters.has('top10') && t20) t20.classList.add('off');
  if(G.filters.has('top20') && t10) t10.classList.add('off');
}

// Clone filter buttons for in-game panel
function buildGameFilter(){
  var wrap = document.getElementById('flt-wrap-game');
  wrap.innerHTML = document.getElementById('flt-wrap').innerHTML;
  wrap.querySelectorAll('.flt').forEach(b=>{
    b.onclick = function(){ toggleFlt(b, true); };
  });
  syncFilterBtns('flt-wrap-game');
}

function startGame(){

  if(pool.length < 10){ alert('Zu wenige Songs – bitte Filter anpassen.'); return; }
  G.deck = shuffle(pool);

// ══════════════════════════════════════════════
// WHEEL
// ══════════════════════════════════════════════
var WHEEL_YEARS=[];
(function(){ for(var y=1960;y<=2026;y+=4) WHEEL_YEARS.push(y); })();

function buildWheel(){
  var svg=document.getElementById('wheel-svg');
  var n=WHEEL_YEARS.length, cx=140,cy=140,r=128, step=2*Math.PI/n;
  var h='';
  for(var i=0;i<n;i++){
    var a1=-Math.PI/2+i*step, a2=a1+step;
    var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    var col=i%2===0?'rgba(83,246,255,.18)':'rgba(143,95,255,.18)';
    h+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 0,1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${col}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
    var la=a1+step/2, lx=cx+r*.65*Math.cos(la), ly=cy+r*.65*Math.sin(la);
    h+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(240,240,255,.75)" font-size="10" font-family="Outfit,sans-serif" font-weight="700">${WHEEL_YEARS[i]}</text>`;
  }
  svg.innerHTML=h;
}

var wRot=0, wSpinning=false;
function spinWheel(){
  if(wSpinning) return;
  wSpinning=true;
  var btn=document.getElementById('wh-spin-btn');
  btn.disabled=true;
  document.getElementById('wh-result').style.display='none';
  var extra=1440+Math.random()*1440, dur=3200, start=null, from=wRot, to=wRot+extra;
  function ease(t){return 1-Math.pow(1-t,4)}
  function step(ts){
    if(!start)start=ts;
    var p=Math.min((ts-start)/dur,1);
    wRot=from+(to-from)*ease(p);
    document.getElementById('wheel-svg').style.transform=`rotate(${wRot}deg)`;
    if(p<1) requestAnimationFrame(step);
    else wheelDone();
  }
  requestAnimationFrame(step);
}

function wheelDone(){
  wSpinning=false;
  var n=WHEEL_YEARS.length;
  var norm=((wRot%360)+360)%360;
  var ptr=(360-norm+270)%360;
  var idx=Math.floor(ptr/(360/n))%n;
  var year=WHEEL_YEARS[idx]+Math.floor(Math.random()*4); // ±0-3 y
  year=Math.max(1960,Math.min(2026,year));
  G.wYears.push(year);
  var el=document.getElementById('wh-result');
  el.textContent=year;
  el.style.display='block';
  el.style.color=G.teams[G.wTeam].color;
  document.getElementById('wh-spin-btn').style.display='none';
  document.getElementById('wh-next-btn').style.display='block';
}

function updateWheelUI(){
  var team=G.teams[G.wTeam];
  var nameEl=document.getElementById('wh-team');
  nameEl.textContent=team.name; nameEl.style.color=team.color;
  document.getElementById('wh-spin-btn').style.display='block';
  document.getElementById('wh-spin-btn').disabled=false;
  document.getElementById('wh-next-btn').style.display='none';
  document.getElementById('wh-result').style.display='none';
}

function nextWheelTeam(){
  G.wTeam++;
  if(G.wTeam >= G.teams.length){
    // Assign starting years, find lowest → first team
    G.teams.forEach((t,i)=>{ t.years=[G.wYears[i]]; });
    var minY=Math.min(...G.wYears);
    G.cur=G.wYears.indexOf(minY);
    beginPlay();
  } else {
    updateWheelUI();
  }
}

// ══════════════════════════════════════════════
// PLAY
// ══════════════════════════════════════════════
function beginPlay(){
  G.phase=1; G.cardLoaded=false; G.readyToReveal=false; G.selBox=null;
  if(G.deck.length===0) G.deck=shuffle(filteredSongs());
  G.currentCard=G.deck.pop();
  showScreen('game');
  buildGameFilter();
  renderPanels();
  updateGameUI();
  pushState();
}

function drawCard(){
  if(G.deck.length===0) G.deck=shuffle(filteredSongs());
  G.currentCard=G.deck.pop();
}

// ══════════════════════════════════════════════
// PANELS
// ══════════════════════════════════════════════
function renderPanels(){
  var L=document.getElementById('panels-left');
  var R=document.getElementById('panels-right');
  L.innerHTML=''; R.innerHTML='';
  G.teams.forEach((team,i)=>{
    (i%2===0?L:R).innerHTML += panelHTML(team,i);
  });
}

function panelHTML(team,idx){
  var isActive=(idx===G.cur);
  var tokenH='';
  for(var t=0;t<MAX_TOK;t++){
    var f=t<team.tokens;
    tokenH+=`<div class="coin ${f?'':'empty'}" style="background:${f?team.color:'transparent'};border-color:${team.color}">¢</div>`;
  }
  var chips='';
  var sorted=team.years.slice().sort((a,b)=>a-b);
  for(var s=0;s<WIN;s++){
    chips+=sorted[s]!==undefined
      ?`<div class="y-chip filled" style="background:${team.color}">${sorted[s]}</div>`
      :`<div class="y-chip empty">—</div>`;
  }
  var init=team.name.substring(0,2).toUpperCase();
  var borderS=isActive?`border-color:${team.color};box-shadow:0 0 20px ${team.color}25`:'';
  return `<div class="t-panel ${isActive?'active':''}" style="${borderS}">
    <div class="p-head">
      <div class="p-avatar" style="background:${team.color}">${init}</div>
      <div class="p-name" style="color:${team.color}">${team.name}</div>
      <div class="p-tokens">${tokenH}</div>
    </div>
    ${isActive?`<div class="active-badge" style="background:${team.color}22;color:${team.color}">▶ AM ZUG</div>`:''}
    <div class="year-chips">${chips}</div>
  </div>`;
}

// GAME UI
// ══════════════════════════════════════════════
function updateGameUI(){
  var team=G.teams[G.cur];

  // Banner
  document.getElementById('banner-name').textContent=team.name;
  document.getElementById('banner-name').style.color=team.color;

  document.getElementById('sp-overlay').classList.remove('gone');

  renderPanels();

}

// ══════════════════════════════════════════════
// CARD PHASES
// ══════════════════════════════════════════════
function cardNext(){
  if(G.phase===1){
    G.phase=2;
    document.getElementById('c-team-name').classList.add('gone');
    document.getElementById('c-comment').classList.add('gone');
    document.getElementById('player-outer').classList.add('show');
    updateHole();
    renderTimeline();
    document.getElementById('year-tl').classList.add('show');

    if(!G.cardLoaded){
      document.getElementById('sp-frame').src=
        'https://open.spotify.com/embed/track/'+G.currentCard.l+
        '?utm_source=generator&theme=0&autoplay=1';
      G.cardLoaded=true;
    }
    G.readyToReveal=false;
    setTimeout(()=>{G.readyToReveal=true;},1000);

    var btn=document.getElementById('main-btn');
    btn.textContent='Aufdecken'; btn.className='btn btn-secondary';

  } else if(G.phase===2 && G.readyToReveal){
    G.phase=3;
    document.getElementById('sp-overlay').classList.add('gone');
    document.getElementById('sp-ot').classList.add('gone');
    document.getElementById('year-tl').classList.remove('show');

    var yr=document.getElementById('c-year');
    yr.textContent=G.currentCard.y; yr.style.display='block';
    document.getElementById('c-artist').textContent=G.currentCard.a;
    document.getElementById('c-title').textContent=G.currentCard.t;
    setTimeout(()=>{
      document.getElementById('c-artist').classList.add('on');
      document.getElementById('c-title').classList.add('on');
    },50);

    document.getElementById('main-btn').style.display='none';
    document.getElementById('score-btns').classList.add('show');
  }
}

// ══════════════════════════════════════════════
// YEAR TIMELINE
// ══════════════════════════════════════════════
function renderTimeline(){
  var team=G.teams[G.cur];
  var sorted=team.years.slice().sort((a,b)=>a-b);
  var tl=document.getElementById('year-tl');
  tl.innerHTML='';
  G.selBox=null;

  // checkbox BEFORE first year
  tl.appendChild(mkBox(0));
  sorted.forEach((year,i)=>{
    var chip=document.createElement('div');
    chip.className='tl-chip';
    chip.style.background=team.color;
    chip.textContent=year;
    tl.appendChild(chip);
    tl.appendChild(mkBox(i+1));
  });
}

function mkBox(idx){
  var el=document.createElement('div');
  el.className='tl-box'; el.dataset.idx=idx;
  el.onclick=function(){
    document.querySelectorAll('.tl-box').forEach(b=>b.classList.remove('sel'));
    el.classList.add('sel');
    G.selBox=idx;
  };
  return el;
}

// ══════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════
function score(type){
  var team=G.teams[G.cur];
  if(type==='year'||type==='both'){
    team.years.push(G.currentCard.y);
    team.years.sort((a,b)=>a-b);
    if(type==='both') team.tokens=Math.min(MAX_TOK,team.tokens+1);
    spawnConfetti(team.color);
  }
  if(team.years.length>=WIN){ showWin(G.cur); return; }
  showTransition();
}

function showTransition(){
  var from=G.teams[G.cur];
  var nextIdx=(G.cur+1)%G.teams.length;
  var to=G.teams[nextIdx];
  document.getElementById('tr-from').textContent='War dran: '+from.name;
  document.getElementById('tr-to').textContent=to.name;
  document.getElementById('tr-to').style.color=to.color;
  document.getElementById('tr-comment').textContent=
    comment('tr',to,[from.name,from.years.length]);
  showScreen('transition');
}

function continueGame(){
  G.cur=(G.cur+1)%G.teams.length;
  G.phase=1;
  G.cardLoaded=false;
  G.readyToReveal=false;
  G.selBox=null;
  drawCard();
  showScreen('game');
  renderPanels();
  updateGameUI();
  pushState();
}

function showWin(idx){
  var team=G.teams[idx];
  document.getElementById('won-name').textContent='🏆 '+team.name;
  document.getElementById('won-name').style.color=team.color;
  document.getElementById('won-comment').textContent=comment('won',team);
  spawnConfetti(team.color);
  setTimeout(()=>spawnConfetti(team.color),400);
  setTimeout(()=>spawnConfetti(team.color),800);
  showScreen('won');
  if(IS_HOST) REF.update({screen:'won',winner:team.name});
}

function resetGame(){
  G.teams=[]; G.deck=[]; G.cur=0; G.phase=1;
  if(IS_HOST) REF.update({screen:'lobby',host:Date.now()});
  showScreen('lobby');
  setTC(3);
  renderTeamInputs();
}

// COMMENTS
// ══════════════════════════════════════════════
function comment(type, team, extra){
  var others=G.teams.filter((_,i)=>i!==G.cur).map(t=>t.name);
  var pool=type==='p1'?CP1:type==='p2'?CP2:type==='tr'?CPI:CPW;
  var idx=G.commentIdx%pool.length; G.commentIdx++;
  try{
    if(type==='tr' && extra) return pool[idx](extra[0], team.name, extra[1]);
    return pool[idx](team.name, others);
  } catch(e){ return pool[idx](team.name); }
}

// CONFETTI
// ══════════════════════════════════════════════
function spawnConfetti(color){
  var c=document.getElementById('confetti');
  for(var i=0;i<40;i++){
    var p=document.createElement('div');
    p.className='cf';
    p.style.cssText=`left:${Math.random()*100}vw;background:${[color,'#fff',COLORS[i%6]][i%3]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.2+Math.random()*1.5}s;animation-delay:${Math.random()*.6}s`;
    c.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  var el=document.getElementById('screen-'+name);
  if(el){ el.classList.add('active'); G.screen=name; }
}

var fieldFlipped=false;
function rotateField(){
  fieldFlipped=!fieldFlipped;
  document.getElementById('game-center').style.transform=
    fieldFlipped?'rotate(180deg)':'rotate(0deg)';
}

function updateHole(){
  var o=document.getElementById('player-outer');
  var w=o.offsetWidth||412, mob=window.innerWidth<600;
  var cx=mob?w-32:w-28, r=mob?18:22, cy=mob?128:124;
  document.getElementById('play-hole').setAttribute('cx',cx);
  document.getElementById('play-hole').setAttribute('r',r);
  document.getElementById('play-hole').setAttribute('cy',cy);
}
window.addEventListener('resize',updateHole);
updateHole();
